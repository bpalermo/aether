apiVersion: apps/v1
kind: Deployment
metadata:
  name: aether-registrar
  namespace: aether-system
  labels:
    app: aether-registrar
    app.kubernetes.io/name: aether-registrar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aether-registrar
      app.kubernetes.io/name: aether-registrar
  template:
    metadata:
      labels:
        app: aether-registrar
        app.kubernetes.io/name: aether-registrar
    spec:
      serviceAccountName: aether-registrar
      containers:
        - name: registrar
          image: docker.io/palermo/aether-registrar:dev
          imagePullPolicy: Always
          args:
            - "--debug=true"
            - "--cluster-name=talos-main"
            - "--registry-backend=kubernetes"
            - "--grpc-address=:8443"
          ports:
            - name: grpc
              containerPort: 8443
              protocol: TCP
            - name: metrics
              containerPort: 8081
              protocol: TCP
            - name: health
              containerPort: 8082
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: GOMEMLIMIT
              valueFrom:
                resourceFieldRef:
                  resource: limits.memory
                  divisor: "1"
            - name: GOMAXPROCS
              valueFrom:
                resourceFieldRef:
                  resource: limits.cpu
                  divisor: "1"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: workload-socket
              mountPath: /run/secrets/workload-spiffe-uds
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: workload-socket
          csi:
            driver: "csi.spiffe.io"
            readOnly: true
