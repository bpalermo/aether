# Proposal 006 Phase 3 — two-region etcd replicator failover e2e.
#
# Stands up TWO throwaway kind clusters, each with its OWN regional etcd
# (shared-nothing registry planes), registrars cross-wired with --peer-etcd
# (P2a mirror loop #512 + P2b origin-heartbeat lease #513 + P2c chart values
# #514), SPIRE on both under one shared trust domain, waypoint on. Asserts:
#
#   1. each region's subtree is mirrored into the peer's etcd (visibility)
#   2. client(a) -> echo(b) == 200 — echo reaches 'a' ONLY via the mirror
#   3. killing b's registrar expires b's mirror in etcd-a at the lease TTL
#      (origin-heartbeat lapse, no peer GC) and the call then fails
#   4. restoring b's registrar re-mirrors under a fresh lease and the call
#      recovers
#
# The whole bring-up + assertions live in the reusable harness
# e2e/multicluster_replicator.sh (up/verify/down); this workflow just builds
# the images via RBE and drives the harness.
#
# NOT run per PR — two kind clusters + the hardened SPIRE chart on each is
# heavy (~30-40min). workflow_dispatch (badge/debug) + a nightly schedule to
# catch regressions in the replication/failover path. Hard gate by default;
# set `soft` to bypass.
#
# See docs/proposals/006_multi-region-etcd-federation.md and issue #511.

name: replicator-e2e

on:
  workflow_dispatch:
    inputs:
      soft:
        description: "Don't fail the job on a replicator e2e failure (debugging only; default is a hard gate)"
        type: boolean
        default: false
  schedule:
    # Nightly at 06:41 UTC (off the hour, after the waypoint run at 05:23).
    - cron: "41 6 * * *"

permissions:
  contents: read

env:
  IMAGE_REGISTRY: ghcr.io/bpalermo/aether

jobs:
  replicator:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true

      # Build + load the four aether images into the local docker daemon as
      # ghcr.io/bpalermo/aether/<img>:latest (same path as conformance/waypoint).
      # The custom aether-proxy is a published image, PULLED by kind (not built
      # here). Retry: bazel repo fetches from GitHub releases intermittently 502.
      - name: Build and load container images
        run: |
          retry() { for n in 1 2 3; do "$@" && return 0; echo "attempt $n failed; retrying in 20s"; sleep 20; done; return 1; }
          for t in //agent/cmd/agent:image_load //cni/cmd/cni-install:image_load \
                   //registrar/cmd/registrar:image_load //controller/cmd/controller:image_load; do
            retry bazel run --config=ci --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_ORG_API_KEY }} "$t"
          done

      # The harness owns everything: two kind clusters + one etcd PER REGION +
      # SPIRE (shared upstream CA) on both + aether (peer-etcd cross-wired) +
      # workloads. REPLICATOR_SKIP_BUILD=1 because the images are already in
      # docker (built above via RBE). Two kinds are inotify-heavy; the harness
      # raises fs.inotify via passwordless sudo (present on GitHub runners).
      - name: Bring up the two-region environment
        env:
          REPLICATOR_SKIP_BUILD: "1"
        run: ./e2e/multicluster_replicator.sh up

      # Visibility -> data path over the mirror -> lease-lapse failover -> recovery.
      - name: Verify replication + failover
        id: verify
        continue-on-error: ${{ github.event.inputs.soft == 'true' }}
        run: ./e2e/multicluster_replicator.sh verify

      - name: Collect diagnostics on failure
        if: failure() || steps.verify.outcome == 'failure'
        run: |
          mkdir -p /tmp/replicator-logs
          for c in a b; do
            echo "=== cluster $c: all pods ===" | tee -a /tmp/replicator-logs/pods.txt
            kubectl --context "kind-$c" get pods -A -o wide 2>&1 | tee -a /tmp/replicator-logs/pods.txt || true
            kind export logs "/tmp/replicator-logs/$c" --name "$c" || true
            kubectl --context "kind-$c" -n aether-system logs -l app.kubernetes.io/component=registrar --tail=300 > "/tmp/replicator-logs/$c-registrar.log" 2>&1 || true
            kubectl --context "kind-$c" -n aether-system logs -l app.kubernetes.io/component=agent --all-containers --tail=200 > "/tmp/replicator-logs/$c-agent.log" 2>&1 || true
            echo "=== regional etcd region-$c keys ===" | tee -a /tmp/replicator-logs/registry-keys.txt
            docker exec "aether-etcd-region-$c" etcdctl get --prefix /aether/v1/regions --keys-only 2>&1 | tee -a /tmp/replicator-logs/registry-keys.txt || true
          done

      - name: Upload diagnostics
        if: failure() || steps.verify.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: replicator-e2e-logs
          path: /tmp/replicator-logs
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: ./e2e/multicluster_replicator.sh down || true
