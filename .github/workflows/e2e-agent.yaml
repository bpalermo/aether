name: e2e-agent

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  e2e-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
      - name: Build and load container images
        run: |
          bazel run //agent/cmd/agent:image_load
          bazel run //cni/cmd/cni-install:image_load
      - name: Setup kind
        uses: helm/kind-action@v1
        with:
          install_only: true
      - name: Run e2e tests
        run: |
          bazel test --test_output=streamed //test/e2e:e2e_test --test_arg=-test.v
      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== kind cluster info ==="
          kubectl cluster-info --context kind-aether-e2e || true
          echo "=== aether-system pods ==="
          kubectl get pods -n aether-system -o wide || true
          echo "=== agent logs ==="
          kubectl logs -n aether-system -l app=aether-agent --all-containers --tail=100 || true
          echo "=== etcd logs ==="
          kubectl logs -n aether-system -l app=etcd --tail=50 || true
          echo "=== events ==="
          kubectl get events -n aether-system --sort-by='.lastTimestamp' || true
      - name: Cleanup kind cluster
        if: always()
        run: |
          kind delete cluster --name aether-e2e || true
