name: e2e-agent

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  e2e-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
      - name: Build and load container images
        run: |
          bazel run //agent/cmd/agent:image_load
          bazel run //cni/cmd/cni-install:image_load
          docker pull gcr.io/etcd-development/etcd:v3.5.21
      - name: Setup kind
        uses: helm/kind-action@v1
        with:
          install_only: true
      - name: Run e2e tests
        run: |
          bazel test --test_output=streamed //test/e2e:e2e_test --test_arg=-test.v
      - name: Collect logs on failure
        if: failure()
        run: |
          # The e2e framework destroys the cluster after tests, so logs
          # may not be available. Attempt collection best-effort.
          if kind get clusters 2>/dev/null | grep -q aether-e2e; then
            kind export logs /tmp/e2e-logs --name aether-e2e || true
            echo "=== aether-system pods ==="
            kubectl --context kind-aether-e2e get pods -n aether-system -o wide 2>/dev/null || true
            echo "=== agent logs ==="
            kubectl --context kind-aether-e2e logs -n aether-system -l app=aether-agent --all-containers --tail=100 2>/dev/null || true
            echo "=== etcd logs ==="
            kubectl --context kind-aether-e2e logs -n aether-system -l app=etcd --tail=50 2>/dev/null || true
            echo "=== events ==="
            kubectl --context kind-aether-e2e get events -n aether-system --sort-by='.lastTimestamp' 2>/dev/null || true
          else
            echo "kind cluster already destroyed by test teardown"
          fi
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: /tmp/e2e-logs
          if-no-files-found: ignore
      - name: Cleanup kind cluster
        if: always()
        run: |
          kind delete cluster --name aether-e2e || true
