name: integration-etcd

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "proxy/**"
      - ".github/workflows/proxy-*.yml"

permissions:
  contents: read

jobs:
  integration-etcd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup LLVM runtime libs
        uses: ./.github/actions/setup-llvm-libs
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
      - name: Test
        run: |
          bazel test --test_output=errors //registry/internal/etcd:etcd_test
