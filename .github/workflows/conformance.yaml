# Gateway API conformance — GATEWAY-HTTP profile in kind.
#
# DRAFT (proposal 024). Stands up a throwaway kind cluster, installs aether's EDGE
# (north-south) path with SPIRE disabled, installs the Gateway API CRDs, and runs the
# upstream conformance suite's GATEWAY-HTTP profile. Uploads the ConformanceReport.
#
# The runner is committed at test/conformance/conformance_test.go but is NOT built in
# the aether module: the gateway-api *conformance* package is a separate Go module
# (`replace sigs.k8s.io/gateway-api => ../`) buildable only inside a gateway-api
# checkout. So this workflow checks out gateway-api@v1.5.1, copies the committed runner
# + mesh overlay into it, and runs `go test` there. See proposal 024 for why.
#
# NOT run on every PR (too heavy: three image builds + kind + cloud-provider-kind +
# ~2min suite). Manual (workflow_dispatch) for badge runs, plus a nightly schedule to
# catch regressions. The per-PR `e2e` job already covers the edge data path functionally.
#
# Feasibility (see docs/proposals/024_conformance-ci.md):
#   - PROVEN: CNI + agent DaemonSet + registrar come up on kind with --spire-enabled=false
#     (test/e2e is merged + green); the edge dials non-mesh conformance backends over
#     CLEARTEXT (BuildEdgeK8sCluster), so GATEWAY-HTTP needs neither SPIRE nor the mesh
#     CNI path; GATEWAY-HTTP is 43/43 on talos (rev21).
#   - ASPIRATIONAL (marked per-step below): the no-SPIRE EDGE chart install on kind, and
#     cloud-provider-kind LoadBalancer addressing populating Gateway.status.addresses.
#     Until validated on a workflow_dispatch run, the suite step is `continue-on-error`.
#
# MESH-HTTP (east-west GAMMA) runs as a second job and is GREEN: Core 8/8 on kind.
# Both profiles are hard gates (set the `soft` input to bypass for debugging).

name: conformance

on:
  workflow_dispatch:
    inputs:
      soft:
        description: "Don't fail the job on a conformance failure (debugging only; default is a hard gate)"
        type: boolean
        default: false
  schedule:
    # Nightly at 04:17 UTC (off the hour to avoid contention).
    - cron: "17 4 * * *"

permissions:
  contents: read

env:
  IMAGE_REGISTRY: ghcr.io/bpalermo/aether
  KIND_CLUSTER: aether-conformance
  GATEWAY_API_VERSION: v1.6.1

jobs:
  gateway-http:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true

      # --- Build + load aether images (same path as the e2e job) ---
      # The controller's validating webhook gates HTTPRoute admission, so the edge
      # install needs it too (the published aether-proxy is pulled by kind, not built).
      # Wrapped in a retry: bazel repository fetches from GitHub releases (gazelle,
      # rules_multitool tools) intermittently 502 on the CDN — transient, not a build error.
      - name: Build and load container images
        run: |
          retry() { for n in 1 2 3; do "$@" && return 0; echo "attempt $n failed; retrying in 20s"; sleep 20; done; return 1; }
          for t in //agent/cmd/agent:image_load //cni/cmd/cni-install:image_load \
                   //registrar/cmd/registrar:image_load //controller/cmd/controller:image_load; do
            retry bazel run --config=ci --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_ORG_API_KEY }} "$t"
          done

      # --- kind cluster ---
      - name: Setup kind
        uses: helm/kind-action@v1
        with:
          cluster_name: aether-conformance
          # The conformance suite needs LoadBalancer addresses; cloud-provider-kind
          # provides them (installed below). A single node is sufficient.

      - name: Load images into kind
        run: |
          for img in agent:latest cni-install:latest registrar:latest controller:latest; do
            kind load docker-image "ghcr.io/bpalermo/aether/${img}" --name "${KIND_CLUSTER}"
          done

      # --- LoadBalancer provider for kind (ASPIRATIONAL: validate IP assignment) ---
      # cloud-provider-kind assigns docker-network IPs to type: LoadBalancer Services so
      # the edge's per-Gateway LB Services get external IPs -> Gateway.status.addresses.
      - name: Start cloud-provider-kind
        run: |
          go install sigs.k8s.io/cloud-provider-kind@latest
          sudo "$(go env GOPATH)/bin/cloud-provider-kind" > /tmp/cloud-provider-kind.log 2>&1 &
          echo "cloud-provider-kind started (pid $!)"

      # --- Gateway API CRDs (standard channel, matching the suite version) ---
      - name: Install Gateway API CRDs
        run: |
          # Experimental channel (superset of standard): the edge agent's manager watches
          # TCPRoute/TLSRoute/UDPRoute (gateway.networking.k8s.io/v1alpha2), which are only
          # in the experimental bundle — without them the manager's watch fails and the
          # edge container crash-loops. GATEWAY-HTTP only exercises Gateway+HTTPRoute, both
          # present here. Server-side apply (the bundle is large; client-side apply flakes
          # on AlreadyExists) — the recommended idempotent way to install CRDs.
          kubectl apply --server-side --force-conflicts -f \
            "https://github.com/kubernetes-sigs/gateway-api/releases/download/${GATEWAY_API_VERSION}/experimental-install.yaml"
          kubectl wait --for=condition=Established crd/gateways.gateway.networking.k8s.io --timeout=60s
          kubectl wait --for=condition=Established crd/httproutes.gateway.networking.k8s.io --timeout=60s

      # --- aether CRDs (MeshConfig) ---
      # The aether chart's edge-meshconfig template does a helm `lookup` for a
      # config.aether.io/v1 MeshConfig, which requires the CRD to exist at render time.
      # The CRDs are a SEPARATE chart (charts/crds); install it first.
      - name: Install aether CRDs (MeshConfig)
        run: |
          # Substitute BOTH publish-time placeholders (version {GIT_COMMIT} + appVersion
          # {STABLE_GIT_VERSION}, the latter rendered into the version label).
          sed -i -e 's/{GIT_COMMIT}/conformance/' -e 's/{STABLE_GIT_VERSION}/0.0.0-conformance/' charts/crds/Chart.yaml
          # CRDs are cluster-scoped — install the release into `default` so it does not
          # own (and conflict on) the aether-system namespace the aether release creates.
          helm install aether-crds charts/crds \
            --namespace default --wait --timeout 2m
          kubectl wait --for=condition=Established crd/meshconfigs.config.aether.io --timeout=60s

      # --- Install aether with the EDGE enabled and SPIRE OFF ---
      # The chart gates ALL components' --spire-enabled on the single `spire.enabled`
      # (verified in agent-daemonset.yaml / edge-deployment.yaml / registrar-deployment.yaml),
      # so `spire.enabled=false` disables mesh mTLS everywhere — which is exactly what
      # GATEWAY-HTTP needs (the edge dials conformance backends over cleartext; the mTLS
      # branch is never taken). registryBackend defaults to kubernetes already.
      #
      # edge.tls.enabled=true wires the edge's downstream-TLS Secret provider (the
      # Kubernetes provider — reads kubernetes.io/tls Secrets via the API server, NO
      # SPIRE) and grants the cluster-wide `secrets` get/list/watch RBAC. The
      # GATEWAY-HTTP base manifests include `same-namespace-with-https-listener`, a
      # Gateway with HTTPS listeners whose certificateRefs point at a TLS Secret in
      # gateway-conformance-infra. Without the Secret provider the edge cannot resolve
      # those certs, marks the listeners (and so the whole Gateway) Programmed=False
      # /ListenersNotValid, and the suite's "Ensuring Gateways ready" setup wait times
      # out (307s) before any test runs — the last-mile blocker. (It is NOT an
      # addressing problem: Accepted=True is set within ~1s and the per-Gateway LB
      # Services get IPs from cloud-provider-kind fine.)
      #
      # edge.gateway.create=false disables the chart's OWN edge Gateway, which is
      # unnecessary for conformance (the suite brings its own Gateways) and otherwise
      # makes edge.tls.enabled=true `required` an edge.gateway.tlsSecretName (the
      # chart-managed HTTPS Gateway needs a cert), failing the helm install.
      #
      # Point the chart at the kind-loaded :latest images: the chart pins agent/cni/
      # registrar/controller to the publish-time `@digest` placeholders, which take
      # precedence over `tag` in the aether.image helper — so each must override
      # digest="" + tag=latest (+ pullPolicy=Never, the image is local). The custom
      # aether-proxy is a published image (not built here), so it is PULLED
      # (IfNotPresent), not Never.
      - name: Install aether (edge, no SPIRE)
        run: |
          # The chart carries publish-time placeholders (version {GIT_COMMIT} +
          # appVersion {STABLE_GIT_VERSION}, the latter rendered into the version label);
          # helm/the API reject them. Substitute valid values for the in-cluster install.
          sed -i -e 's/{GIT_COMMIT}/conformance/' -e 's/{STABLE_GIT_VERSION}/0.0.0-conformance/' charts/aether/Chart.yaml
          img() { echo "--set $1.image.repository=${IMAGE_REGISTRY}/$2 --set $1.image.tag=latest --set $1.image.digest= --set $1.image.pullPolicy=Never"; }
          # Let helm own aether-system (--create-namespace, needed for the release
          # secret) and disable the chart's own namespace.yaml (namespace.create=false)
          # so the two don't collide. The edge namespace (aether-ingress) is created by
          # the chart and is not the release namespace, so it doesn't conflict.
          helm install aether charts/aether \
            --namespace aether-system --create-namespace \
            --set namespace.create=false \
            --set spire.enabled=false \
            --set edge.enabled=true \
            --set edge.tls.enabled=true \
            --set edge.gateway.create=false \
            $(img agent agent) \
            $(img cniInstall cni-install) \
            $(img registrar registrar) \
            $(img controller controller) \
            --set proxy.image.pullPolicy=IfNotPresent
          kubectl get gatewayclass aether -o yaml || true

      # GATEWAY-HTTP only needs the EDGE (it routes to unmeshed conformance backends over
      # STRICT_DNS and runs in local-only mode), so gate on the edge rollout rather than
      # `helm --wait` over the whole release — the registrar/agent DaemonSet need not be
      # Ready for the north-south suite, and blocking on them would fail the install.
      - name: Wait for edge to be Ready
        run: |
          kubectl rollout status deploy/aether-edge -n aether-ingress --timeout=5m || {
            echo "edge not ready; cluster state:"; kubectl get pods -A -o wide; exit 1;
          }
          kubectl rollout status daemonset/aether-agent -n aether-system --timeout=2m || \
            echo "agent DaemonSet not Ready (not required for GATEWAY-HTTP); continuing"

      # --- Check out the gateway-api source at the suite version ---
      # The conformance suite is a SEPARATE Go module with `replace ... => ../`, so it
      # only builds INSIDE a gateway-api checkout. The committed runner + mesh overlay
      # are copied in, then `go test` runs within that module (see proposal 024).
      - name: Check out gateway-api @ suite version
        uses: actions/checkout@v6
        with:
          repository: kubernetes-sigs/gateway-api
          ref: ${{ env.GATEWAY_API_VERSION }}
          path: gateway-api

      - name: Drop in the aether runner + mesh overlay
        run: |
          cp test/conformance/conformance_test.go \
            gateway-api/conformance/aether_conformance_test.go
          cp test/conformance/mesh/manifests.yaml \
            gateway-api/conformance/mesh/manifests.yaml

      # --- Run the committed conformance runner: GATEWAY-HTTP only ---
      - name: Run GATEWAY-HTTP conformance
        id: conformance
        working-directory: gateway-api/conformance
        # Hard gate: validated GREEN on kind (43 PASS / 0 FAIL, matching talos 43/43)
        # on 2026-06-28. A regression now fails the run. Set the `soft` input to make
        # it non-blocking for one-off debugging.
        continue-on-error: ${{ github.event.inputs.soft == 'true' }}
        env:
          AETHER_CONFORMANCE: "1"
          AETHER_CONFORMANCE_REPORT: ${{ runner.temp }}/gateway-http-report.yaml
        # -tags conformance selects the dropped-in runner (the committed file carries
        # `//go:build conformance` so it stays out of the aether module build).
        run: |
          # -parallel 1: gateway-api 1.6 marked many tests Parallel; concurrent
          # same-match routes on the shared Gateway flap between backends until
          # aether implements cross-route oldest-wins precedence (follow-up).
          go test . \
            -tags conformance \
            -run TestAetherGatewayHTTP \
            -parallel 1 \
            -v -timeout 30m

      - name: Upload conformance report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gateway-http-conformance-report
          path: ${{ runner.temp }}/gateway-http-report.yaml
          if-no-files-found: warn

      # --- Failure diagnostics (mirrors the e2e job's collection step) ---
      - name: Collect logs on failure
        if: failure() || steps.conformance.outcome == 'failure'
        run: |
          mkdir -p /tmp/conformance-logs
          kind export logs /tmp/conformance-logs --name "${KIND_CLUSTER}" || true
          echo "=== all pods ==="
          kubectl get pods -A -o wide || true
          echo "=== not-ready pods (described) ==="
          kubectl get pods -A --field-selector=status.phase!=Running -o name | while read -r p; do
            kubectl describe -n "$(echo "$p" | cut -d/ -f1 2>/dev/null || true)" "$p" 2>/dev/null | tail -25 || true
          done || true
          echo "=== gatewayclass / gateways / httproutes ==="
          kubectl get gatewayclass,gateways,httproutes -A -o wide || true
          echo "=== edge / registrar / controller / agent logs ==="
          kubectl logs -n aether-ingress -l app.kubernetes.io/name=aether-edge --all-containers --tail=200 || true
          for d in registrar controller; do kubectl logs -n aether-system deploy/aether-$d --all-containers --tail=120 || true; done
          kubectl logs -n aether-system daemonset/aether-agent --all-containers --tail=100 || true
          cp /tmp/cloud-provider-kind.log /tmp/conformance-logs/ || true

      - name: Upload logs on failure
        if: failure() || steps.conformance.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: conformance-logs
          path: /tmp/conformance-logs
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: kind delete cluster --name "${KIND_CLUSTER}" || true

  # --- MESH-HTTP (east-west GAMMA) conformance ---
  # Unlike GATEWAY-HTTP (edge-only, never touches the mesh data path), this job
  # exercises the FULL mesh path on kind: the agent DaemonSet + CNI capture each echo
  # pod's egress (redirect-all) and the agent routes it through the cap_http GAMMA
  # tables (proposals 018/022/023) to the per-version backends. SPIRE is off, so the
  # mesh hop is CLEARTEXT — the per-pod inbound listener degrades to a no-mTLS HCM
  # chain symmetric with the cleartext outbound clusters (the suite asserts routing
  # correctness, not mTLS). Soft (continue-on-error) until the score is green; do not
  # let it regress the GATEWAY-HTTP gate. Runs in its own kind cluster so the two jobs
  # don't collide.
  mesh-http:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      KIND_CLUSTER: aether-conformance-mesh
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true

      # Build + load the same four aether images as GATEWAY-HTTP. The mesh path needs
      # the agent (xDS + per-pod listeners), cni-install (capture redirect), registrar
      # (selectorless mesh Services / endpoint stream), and controller (namespace
      # injection webhook + MeshConfig projection).
      - name: Build and load container images
        run: |
          retry() { for n in 1 2 3; do "$@" && return 0; echo "attempt $n failed; retrying in 20s"; sleep 20; done; return 1; }
          for t in //agent/cmd/agent:image_load //cni/cmd/cni-install:image_load \
                   //registrar/cmd/registrar:image_load //controller/cmd/controller:image_load; do
            retry bazel run --config=ci --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_ORG_API_KEY }} "$t"
          done

      - name: Setup kind
        uses: helm/kind-action@v1
        with:
          cluster_name: aether-conformance-mesh

      - name: Load images into kind
        run: |
          for img in agent:latest cni-install:latest registrar:latest controller:latest; do
            kind load docker-image "ghcr.io/bpalermo/aether/${img}" --name "${KIND_CLUSTER}"
          done

      # Experimental Gateway API CRDs (the controller/agent watch the v1alpha2 routes;
      # the standard channel omits them → crash-loop). Same install as GATEWAY-HTTP.
      - name: Install Gateway API CRDs
        run: |
          kubectl apply --server-side --force-conflicts -f \
            "https://github.com/kubernetes-sigs/gateway-api/releases/download/${GATEWAY_API_VERSION}/experimental-install.yaml"
          kubectl wait --for=condition=Established crd/gateways.gateway.networking.k8s.io --timeout=60s
          kubectl wait --for=condition=Established crd/httproutes.gateway.networking.k8s.io --timeout=60s

      - name: Install aether CRDs (MeshConfig)
        run: |
          sed -i -e 's/{GIT_COMMIT}/conformance/' -e 's/{STABLE_GIT_VERSION}/0.0.0-conformance/' charts/crds/Chart.yaml
          helm install aether-crds charts/crds \
            --namespace default --wait --timeout 2m
          kubectl wait --for=condition=Established crd/meshconfigs.config.aether.io --timeout=60s

      # Install aether with the MESH path on and SPIRE off. spire.enabled=false flips
      # the agent's cleartext-mesh mode (no SVID/SDS → cleartext inbound listener,
      # already-cleartext outbound). agent.gamma=true turns on the GAMMA reconciler
      # (HTTPRoute parentRef=Service → cap_http route tables). redirect-all is now the
      # chart DEFAULT (agent.captureRedirectAllDefault=true, soak-validated on talos
      # 2026-06-29), so the mesh path captures each managed pod's real Service
      # ClusterIP:port with NO per-pod annotation — the overlay's managed-namespace
      # label is enough (namespace injection labels the echo pods managed → default
      # redirect-all). This exercises the real default config, not the old per-pod
      # opt-in. transparentCapture / generateMeshServices / namespaceInjection /
      # injectPodNdots are chart defaults (on). The edge is not needed east-west, so
      # leave it off.
      - name: Install aether (mesh, no SPIRE)
        run: |
          sed -i -e 's/{GIT_COMMIT}/conformance/' -e 's/{STABLE_GIT_VERSION}/0.0.0-conformance/' charts/aether/Chart.yaml
          img() { echo "--set $1.image.repository=${IMAGE_REGISTRY}/$2 --set $1.image.tag=latest --set $1.image.digest= --set $1.image.pullPolicy=Never"; }
          helm install aether charts/aether \
            --namespace aether-system --create-namespace \
            --set namespace.create=false \
            --set spire.enabled=false \
            --set agent.gamma=true \
            $(img agent agent) \
            $(img cniInstall cni-install) \
            $(img registrar registrar) \
            $(img controller controller) \
            --set proxy.image.pullPolicy=IfNotPresent
          kubectl get gatewayclass aether -o yaml || true

      # The mesh path needs the agent DaemonSet (per-pod listeners + capture), the
      # registrar (endpoint stream + mesh Services), and the controller (namespace
      # injection webhook). Gate on all three before running the suite.
      - name: Wait for mesh control plane to be Ready
        run: |
          kubectl rollout status daemonset/aether-agent -n aether-system --timeout=5m || {
            echo "agent DaemonSet not ready; cluster state:"; kubectl get pods -A -o wide; exit 1;
          }
          kubectl rollout status deploy/aether-registrar -n aether-system --timeout=3m || \
            echo "registrar not Ready; continuing (may still converge)"
          kubectl rollout status deploy/aether-controller -n aether-system --timeout=3m || \
            echo "controller not Ready; continuing (namespace injection may be degraded)"

      - name: Check out gateway-api @ suite version
        uses: actions/checkout@v6
        with:
          repository: kubernetes-sigs/gateway-api
          ref: ${{ env.GATEWAY_API_VERSION }}
          path: gateway-api

      - name: Drop in the aether runner + mesh overlay
        run: |
          cp test/conformance/conformance_test.go \
            gateway-api/conformance/aether_conformance_test.go
          cp test/conformance/mesh/manifests.yaml \
            gateway-api/conformance/mesh/manifests.yaml

      # Hard gate: MESH-HTTP Core is GREEN on kind (8 PASS / 0 FAIL, validated 2026-06-29
      # — #433 fixed the runner's per-test manifest loading). A regression now fails the
      # run. Set the `soft` input to make it non-blocking for one-off debugging. The
      # runner still records per-test results in the always-uploaded report.
      - name: Run MESH-HTTP conformance
        id: conformance
        working-directory: gateway-api/conformance
        continue-on-error: ${{ github.event.inputs.soft == 'true' }}
        env:
          AETHER_CONFORMANCE: "1"
          AETHER_CONFORMANCE_REPORT: ${{ runner.temp }}/mesh-http-report.yaml
        run: |
          # -parallel 1: see the GATEWAY-HTTP note above.
          go test . \
            -tags conformance \
            -run TestAetherMeshHTTP \
            -parallel 1 \
            -v -timeout 40m

      - name: Upload conformance report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mesh-http-conformance-report
          path: ${{ runner.temp }}/mesh-http-report.yaml
          if-no-files-found: warn

      - name: Collect logs on failure
        if: always()
        run: |
          mkdir -p /tmp/mesh-conformance-logs
          kind export logs /tmp/mesh-conformance-logs --name "${KIND_CLUSTER}" || true
          echo "=== all pods ==="
          kubectl get pods -A -o wide || true
          echo "=== mesh conformance namespaces ==="
          for ns in gateway-conformance-mesh gateway-conformance-mesh-consumer; do
            echo "--- $ns ---"
            kubectl get pods,httproutes,svc,sa -n "$ns" -o wide || true
          done
          echo "=== agent / registrar / controller logs ==="
          kubectl logs -n aether-system daemonset/aether-agent --all-containers --tail=200 || true
          for d in registrar controller; do kubectl logs -n aether-system deploy/aether-$d --all-containers --tail=120 || true; done

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mesh-conformance-logs
          path: /tmp/mesh-conformance-logs
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: kind delete cluster --name "${KIND_CLUSTER}" || true
