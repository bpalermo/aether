# Nightly e2e — conformance (GATEWAY-HTTP + MESH-HTTP), waypoint, replicator.
#
# Consolidates the former conformance.yaml, waypoint-e2e.yaml, and
# replicator-e2e.yaml into ONE workflow: a single bazel `build` job builds the
# four aether images once (RBE) and ships them as a docker-save artifact; the
# four test jobs run in PARALLEL, bazel-free (kind + kubectl/helm + the
# artifact). This removes 3× duplicated toolchain setup + image assembly and
# gives one nightly schedule instead of three staggered ones (parallel jobs on
# separate runners don't contend).
#
# Per-job docs live with each job below; they are lifted verbatim from the
# original workflows (proposals 024, 019, 006 — issues #507/#511). All test
# jobs are hard gates; set the `soft` input to bypass for debugging. Use the
# `only` input to run a subset from workflow_dispatch.
#
# NOT run per PR (too heavy). The per-PR `e2e` job in ci.yaml covers the basic
# data path functionally.

name: e2e

on:
  workflow_dispatch:
    inputs:
      soft:
        description: "Don't fail jobs on a test failure (debugging only; default is a hard gate)"
        type: boolean
        default: false
      only:
        description: "Run a single job (debugging)"
        type: choice
        default: all
        options: [all, gateway-http, mesh-http, waypoint, replicator]
  schedule:
    # Nightly at 04:17 UTC (off the hour to avoid contention).
    - cron: "17 4 * * *"

permissions:
  contents: read

env:
  IMAGE_REGISTRY: ghcr.io/bpalermo/aether
  GATEWAY_API_VERSION: v1.6.1

jobs:
  # --- The ONLY bazel job: build the four aether images once, ship as artifact.
  # The custom aether-proxy is a published image (pulled by kind), not built here.
  # Wrapped in a retry: bazel repository fetches from GitHub releases (gazelle,
  # rules_multitool tools) intermittently 502 on the CDN — transient.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true

      - name: Build and load container images
        run: |
          retry() { for n in 1 2 3; do "$@" && return 0; echo "attempt $n failed; retrying in 20s"; sleep 20; done; return 1; }
          for t in //agent/cmd/agent:image_load //cni/cmd/cni-install:image_load \
                   //registrar/cmd/registrar:image_load //controller/cmd/controller:image_load; do
            retry bazel run --config=ci --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_ORG_API_KEY }} "$t"
          done

      - name: Save images to artifact
        run: |
          docker save \
            "${IMAGE_REGISTRY}/agent:latest" \
            "${IMAGE_REGISTRY}/cni-install:latest" \
            "${IMAGE_REGISTRY}/registrar:latest" \
            "${IMAGE_REGISTRY}/controller:latest" \
            -o /tmp/aether-images.tar

      - name: Upload images artifact
        uses: actions/upload-artifact@v7
        with:
          name: aether-images
          path: /tmp/aether-images.tar
          retention-days: 1
          compression-level: 1

  # --- Gateway API conformance: GATEWAY-HTTP profile in kind (proposal 024).
  # Throwaway kind cluster, aether EDGE (north-south) with SPIRE disabled,
  # Gateway API CRDs, upstream suite's GATEWAY-HTTP profile. The runner is
  # committed at test/conformance/conformance_test.go but builds only INSIDE a
  # gateway-api checkout (the conformance pkg is a self-replace module), so the
  # job checks out gateway-api@$GATEWAY_API_VERSION and copies the runner in.
  gateway-http:
    needs: build
    if: github.event_name == 'schedule' || github.event.inputs.only == 'all' || github.event.inputs.only == 'gateway-http'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      KIND_CLUSTER: aether-conformance
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download images artifact
        uses: actions/download-artifact@v7
        with:
          name: aether-images
          path: /tmp

      - name: Load images into docker
        run: docker load -i /tmp/aether-images.tar

      - name: Setup kind
        uses: helm/kind-action@v1
        with:
          cluster_name: aether-conformance

      - name: Load images into kind
        run: |
          for img in agent:latest cni-install:latest registrar:latest controller:latest; do
            kind load docker-image "${IMAGE_REGISTRY}/${img}" --name "${KIND_CLUSTER}"
          done

      # cloud-provider-kind assigns docker-network IPs to type: LoadBalancer
      # Services so the edge's per-Gateway LB Services get external IPs ->
      # Gateway.status.addresses.
      - name: Start cloud-provider-kind
        run: |
          go install sigs.k8s.io/cloud-provider-kind@latest
          sudo "$(go env GOPATH)/bin/cloud-provider-kind" > /tmp/cloud-provider-kind.log 2>&1 &
          echo "cloud-provider-kind started (pid $!)"

      # Experimental channel (superset of standard): the edge agent's manager
      # watches TCPRoute/TLSRoute, TLSRoute is experimental-only — without it the
      # manager's watch fails and the edge container crash-loops. Server-side
      # apply: the bundle is large; client-side apply flakes on AlreadyExists.
      - name: Install Gateway API CRDs
        run: |
          kubectl apply --server-side --force-conflicts -f \
            "https://github.com/kubernetes-sigs/gateway-api/releases/download/${GATEWAY_API_VERSION}/experimental-install.yaml"
          kubectl wait --for=condition=Established crd/gateways.gateway.networking.k8s.io --timeout=60s
          kubectl wait --for=condition=Established crd/httproutes.gateway.networking.k8s.io --timeout=60s

      # The aether chart's edge-meshconfig template does a helm `lookup` for a
      # config.aether.io/v1 MeshConfig, which requires the CRD at render time.
      - name: Install aether CRDs (MeshConfig)
        run: |
          sed -i -e 's/{GIT_COMMIT}/conformance/' -e 's/{STABLE_GIT_VERSION}/0.0.0-conformance/' charts/crds/Chart.yaml
          helm install aether-crds charts/crds \
            --namespace default --wait --timeout 2m
          kubectl wait --for=condition=Established crd/meshconfigs.config.aether.io --timeout=60s

      # Install aether with the EDGE enabled and SPIRE OFF: the edge dials
      # conformance backends over cleartext. edge.tls.enabled=true wires the
      # Kubernetes Secret provider (the HTTPS-listener fixtures need cert
      # resolution or Gateways stay Programmed=False and setup times out).
      # edge.gateway.create=false: the suite brings its own Gateways. Images are
      # the kind-loaded :latest (digest cleared — it wins over tag otherwise).
      - name: Install aether (edge, no SPIRE)
        run: |
          sed -i -e 's/{GIT_COMMIT}/conformance/' -e 's/{STABLE_GIT_VERSION}/0.0.0-conformance/' charts/aether/Chart.yaml
          img() { echo "--set $1.image.repository=${IMAGE_REGISTRY}/$2 --set $1.image.tag=latest --set $1.image.digest= --set $1.image.pullPolicy=Never"; }
          helm install aether charts/aether \
            --namespace aether-system --create-namespace \
            --set namespace.create=false \
            --set spire.enabled=false \
            --set edge.enabled=true \
            --set edge.tls.enabled=true \
            --set edge.gateway.create=false \
            $(img agent agent) \
            $(img cniInstall cni-install) \
            $(img registrar registrar) \
            $(img controller controller) \
            --set proxy.image.pullPolicy=IfNotPresent
          kubectl get gatewayclass aether -o yaml || true

      - name: Wait for edge to be Ready
        run: |
          kubectl rollout status deploy/aether-edge -n aether-ingress --timeout=5m || {
            echo "edge not ready; cluster state:"; kubectl get pods -A -o wide; exit 1;
          }
          kubectl rollout status daemonset/aether-agent -n aether-system --timeout=2m || \
            echo "agent DaemonSet not Ready (not required for GATEWAY-HTTP); continuing"

      - name: Check out gateway-api @ suite version
        uses: actions/checkout@v6
        with:
          repository: kubernetes-sigs/gateway-api
          ref: ${{ env.GATEWAY_API_VERSION }}
          path: gateway-api

      - name: Drop in the aether runner + mesh overlay
        run: |
          cp test/conformance/conformance_test.go \
            gateway-api/conformance/aether_conformance_test.go
          cp test/conformance/mesh/manifests.yaml \
            gateway-api/conformance/mesh/manifests.yaml

      # Hard gate (43/43 on kind + talos). -parallel 1: gateway-api 1.6 marked
      # many tests Parallel; concurrent same-match routes flap between backends
      # until aether implements cross-route oldest-wins precedence (#533).
      - name: Run GATEWAY-HTTP conformance
        id: conformance
        working-directory: gateway-api/conformance
        continue-on-error: ${{ github.event.inputs.soft == 'true' }}
        env:
          AETHER_CONFORMANCE: "1"
          AETHER_CONFORMANCE_REPORT: ${{ runner.temp }}/gateway-http-report.yaml
        run: |
          go test . \
            -tags conformance \
            -run TestAetherGatewayHTTP \
            -parallel 1 \
            -v -timeout 60m

      - name: Upload conformance report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gateway-http-conformance-report
          path: ${{ runner.temp }}/gateway-http-report.yaml
          if-no-files-found: warn

      - name: Collect logs on failure
        if: failure() || steps.conformance.outcome == 'failure'
        run: |
          mkdir -p /tmp/conformance-logs
          kind export logs /tmp/conformance-logs --name "${KIND_CLUSTER}" || true
          echo "=== all pods ==="
          kubectl get pods -A -o wide || true
          echo "=== gatewayclass / gateways / httproutes ==="
          kubectl get gatewayclass,gateways,httproutes -A -o wide || true
          echo "=== edge / registrar / controller / agent logs ==="
          kubectl logs -n aether-ingress -l app.kubernetes.io/name=aether-edge --all-containers --tail=200 || true
          for d in registrar controller; do kubectl logs -n aether-system deploy/aether-$d --all-containers --tail=120 || true; done
          kubectl logs -n aether-system daemonset/aether-agent --all-containers --tail=100 || true
          cp /tmp/cloud-provider-kind.log /tmp/conformance-logs/ || true

      - name: Upload logs on failure
        if: failure() || steps.conformance.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: conformance-logs
          path: /tmp/conformance-logs
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: kind delete cluster --name "${KIND_CLUSTER}" || true

  # --- MESH-HTTP (east-west GAMMA) conformance: the FULL mesh path on kind —
  # CNI capture (redirect-all default) + GAMMA cap_http tables, SPIRE off
  # (cleartext mesh mode). Hard gate (Core 8/8). Own kind cluster.
  mesh-http:
    needs: build
    if: github.event_name == 'schedule' || github.event.inputs.only == 'all' || github.event.inputs.only == 'mesh-http'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      KIND_CLUSTER: aether-conformance-mesh
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download images artifact
        uses: actions/download-artifact@v7
        with:
          name: aether-images
          path: /tmp

      - name: Load images into docker
        run: docker load -i /tmp/aether-images.tar

      - name: Setup kind
        uses: helm/kind-action@v1
        with:
          cluster_name: aether-conformance-mesh

      - name: Load images into kind
        run: |
          for img in agent:latest cni-install:latest registrar:latest controller:latest; do
            kind load docker-image "${IMAGE_REGISTRY}/${img}" --name "${KIND_CLUSTER}"
          done

      - name: Install Gateway API CRDs
        run: |
          kubectl apply --server-side --force-conflicts -f \
            "https://github.com/kubernetes-sigs/gateway-api/releases/download/${GATEWAY_API_VERSION}/experimental-install.yaml"
          kubectl wait --for=condition=Established crd/gateways.gateway.networking.k8s.io --timeout=60s
          kubectl wait --for=condition=Established crd/httproutes.gateway.networking.k8s.io --timeout=60s

      - name: Install aether CRDs (MeshConfig)
        run: |
          sed -i -e 's/{GIT_COMMIT}/conformance/' -e 's/{STABLE_GIT_VERSION}/0.0.0-conformance/' charts/crds/Chart.yaml
          helm install aether-crds charts/crds \
            --namespace default --wait --timeout 2m
          kubectl wait --for=condition=Established crd/meshconfigs.config.aether.io --timeout=60s

      # Mesh path on, SPIRE off (cleartext mesh mode); gamma + redirect-all +
      # capture + generateMeshServices + namespace injection are chart defaults.
      - name: Install aether (mesh, no SPIRE)
        run: |
          sed -i -e 's/{GIT_COMMIT}/conformance/' -e 's/{STABLE_GIT_VERSION}/0.0.0-conformance/' charts/aether/Chart.yaml
          img() { echo "--set $1.image.repository=${IMAGE_REGISTRY}/$2 --set $1.image.tag=latest --set $1.image.digest= --set $1.image.pullPolicy=Never"; }
          helm install aether charts/aether \
            --namespace aether-system --create-namespace \
            --set namespace.create=false \
            --set spire.enabled=false \
            --set agent.gamma=true \
            $(img agent agent) \
            $(img cniInstall cni-install) \
            $(img registrar registrar) \
            $(img controller controller) \
            --set proxy.image.pullPolicy=IfNotPresent
          kubectl get gatewayclass aether -o yaml || true

      - name: Wait for mesh control plane to be Ready
        run: |
          kubectl rollout status daemonset/aether-agent -n aether-system --timeout=5m || {
            echo "agent DaemonSet not ready; cluster state:"; kubectl get pods -A -o wide; exit 1;
          }
          kubectl rollout status deploy/aether-registrar -n aether-system --timeout=3m || \
            echo "registrar not Ready; continuing (may still converge)"
          kubectl rollout status deploy/aether-controller -n aether-system --timeout=3m || \
            echo "controller not Ready; continuing (namespace injection may be degraded)"

      - name: Check out gateway-api @ suite version
        uses: actions/checkout@v6
        with:
          repository: kubernetes-sigs/gateway-api
          ref: ${{ env.GATEWAY_API_VERSION }}
          path: gateway-api

      - name: Drop in the aether runner + mesh overlay
        run: |
          cp test/conformance/conformance_test.go \
            gateway-api/conformance/aether_conformance_test.go
          cp test/conformance/mesh/manifests.yaml \
            gateway-api/conformance/mesh/manifests.yaml

      - name: Run MESH-HTTP conformance
        id: conformance
        working-directory: gateway-api/conformance
        continue-on-error: ${{ github.event.inputs.soft == 'true' }}
        env:
          AETHER_CONFORMANCE: "1"
          AETHER_CONFORMANCE_REPORT: ${{ runner.temp }}/mesh-http-report.yaml
        run: |
          go test . \
            -tags conformance \
            -run TestAetherMeshHTTP \
            -parallel 1 \
            -v -timeout 60m

      - name: Upload conformance report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mesh-http-conformance-report
          path: ${{ runner.temp }}/mesh-http-report.yaml
          if-no-files-found: warn

      - name: Collect logs on failure
        if: always()
        run: |
          mkdir -p /tmp/mesh-conformance-logs
          kind export logs /tmp/mesh-conformance-logs --name "${KIND_CLUSTER}" || true
          echo "=== all pods ==="
          kubectl get pods -A -o wide || true
          echo "=== mesh conformance namespaces ==="
          for ns in gateway-conformance-mesh gateway-conformance-mesh-consumer; do
            echo "--- $ns ---"
            kubectl get pods,httproutes,svc,sa -n "$ns" -o wide || true
          done
          echo "=== agent / registrar / controller logs ==="
          kubectl logs -n aether-system daemonset/aether-agent --all-containers --tail=200 || true
          for d in registrar controller; do kubectl logs -n aether-system deploy/aether-$d --all-containers --tail=120 || true; done

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mesh-conformance-logs
          path: /tmp/mesh-conformance-logs
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: kind delete cluster --name "${KIND_CLUSTER}" || true

  # --- Proposal 019: per-node east/west waypoint cross-cluster data-path e2e.
  # Two kind clusters on the shared docker network + shared etcd + SPIRE on both
  # under one shared upstream CA; asserts client(a) -> echo(b) over the node
  # tunnel with mTLS end-to-end. Harness: e2e/multicluster_waypoint.sh.
  waypoint:
    needs: build
    if: github.event_name == 'schedule' || github.event.inputs.only == 'all' || github.event.inputs.only == 'waypoint'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download images artifact
        uses: actions/download-artifact@v7
        with:
          name: aether-images
          path: /tmp

      - name: Load images into docker
        run: docker load -i /tmp/aether-images.tar

      - name: Bring up the two-cluster waypoint environment
        env:
          WAYPOINT_SKIP_BUILD: "1"
        run: ./e2e/multicluster_waypoint.sh up

      - name: Verify cross-cluster waypoint call
        id: verify
        continue-on-error: ${{ github.event.inputs.soft == 'true' }}
        run: ./e2e/multicluster_waypoint.sh verify

      - name: Collect diagnostics on failure
        if: failure() || steps.verify.outcome == 'failure'
        run: |
          mkdir -p /tmp/waypoint-logs
          for c in a b; do
            echo "=== cluster $c: all pods ===" | tee -a /tmp/waypoint-logs/pods.txt
            kubectl --context "kind-$c" get pods -A -o wide 2>&1 | tee -a /tmp/waypoint-logs/pods.txt || true
            kind export logs "/tmp/waypoint-logs/$c" --name "$c" || true
            kubectl --context "kind-$c" -n aether-system logs -l app.kubernetes.io/component=agent --all-containers --tail=200 > "/tmp/waypoint-logs/$c-agent.log" 2>&1 || true
            kubectl --context "kind-$c" -n aether-system logs -l app.kubernetes.io/component=proxy -c proxy --tail=200 > "/tmp/waypoint-logs/$c-proxy.log" 2>&1 || true
            kubectl --context "kind-$c" -n spire-mgmt get pods -o wide > "/tmp/waypoint-logs/$c-spire.txt" 2>&1 || true
          done
          echo "=== shared registry (echo endpoint / node_ip) ==="
          docker exec aether-shared-etcd etcdctl get --prefix /aether/v1/regions --keys-only 2>&1 | tee /tmp/waypoint-logs/registry-keys.txt || true

      - name: Upload diagnostics
        if: failure() || steps.verify.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: waypoint-e2e-logs
          path: /tmp/waypoint-logs
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: ./e2e/multicluster_waypoint.sh down || true

  # --- Proposal 006 Phase 3: two-region etcd replicator failover e2e.
  # Two kind clusters with one etcd PER REGION, registrars cross-wired with
  # --peer-etcd; asserts mirror visibility, data path over the mirror,
  # lease-lapse failover, recovery. Harness: e2e/multicluster_replicator.sh.
  replicator:
    needs: build
    if: github.event_name == 'schedule' || github.event.inputs.only == 'all' || github.event.inputs.only == 'replicator'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download images artifact
        uses: actions/download-artifact@v7
        with:
          name: aether-images
          path: /tmp

      - name: Load images into docker
        run: docker load -i /tmp/aether-images.tar

      - name: Bring up the two-region environment
        env:
          REPLICATOR_SKIP_BUILD: "1"
        run: ./e2e/multicluster_replicator.sh up

      - name: Verify replication + failover
        id: verify
        continue-on-error: ${{ github.event.inputs.soft == 'true' }}
        run: ./e2e/multicluster_replicator.sh verify

      - name: Collect diagnostics on failure
        if: failure() || steps.verify.outcome == 'failure'
        run: |
          mkdir -p /tmp/replicator-logs
          for c in a b; do
            echo "=== cluster $c: all pods ===" | tee -a /tmp/replicator-logs/pods.txt
            kubectl --context "kind-$c" get pods -A -o wide 2>&1 | tee -a /tmp/replicator-logs/pods.txt || true
            kind export logs "/tmp/replicator-logs/$c" --name "$c" || true
            kubectl --context "kind-$c" -n aether-system logs -l app.kubernetes.io/component=registrar --tail=300 > "/tmp/replicator-logs/$c-registrar.log" 2>&1 || true
            kubectl --context "kind-$c" -n aether-system logs -l app.kubernetes.io/component=agent --all-containers --tail=200 > "/tmp/replicator-logs/$c-agent.log" 2>&1 || true
            echo "=== regional etcd region-$c keys ===" | tee -a /tmp/replicator-logs/registry-keys.txt
            docker exec "aether-etcd-region-$c" etcdctl get --prefix /aether/v1/regions --keys-only 2>&1 | tee -a /tmp/replicator-logs/registry-keys.txt || true
          done

      - name: Upload diagnostics
        if: failure() || steps.verify.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: replicator-e2e-logs
          path: /tmp/replicator-logs
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: ./e2e/multicluster_replicator.sh down || true
