name: e2e-cloudmap

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  e2e-cloudmap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
      - name: Test
        run: |
          bazel test --test_output=errors //registry/internal/cloudmap:cloudmap_test
