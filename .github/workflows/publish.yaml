name: publish

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_REGISTRY: ghcr.io/bpalermo/aether
  # BuildBuddy RBE (see .bazelrc `--config=remote`) — runs the build on the hosted
  # executor pool and reuses the cache warmed by PR `ci` builds.
  REMOTE_HEADER: --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_ORG_API_KEY }}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: main
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          repository-cache: true
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        run: |
          bazel build --stamp --config=remote ${{ env.REMOTE_HEADER }} //...
      # `*.push` publishes each chart together with the images it references
      # (agent.push -> agent + cni-install images; registrar.push -> registrar
      # image), so a single GHCR login covers both images and charts.
      - name: Push charts + images
        env:
          HELM_REGISTRY_USERNAME: ${{ github.actor }}
          HELM_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bazel run --stamp --config=remote ${{ env.REMOTE_HEADER }} //charts/agent:agent.push
          bazel run --stamp --config=remote ${{ env.REMOTE_HEADER }} //charts/registrar:registrar.push
