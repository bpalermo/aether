name: ci

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "proxy/**"
      - ".github/workflows/proxy-*.yml"

permissions:
  contents: read

env:
  IMAGE_REGISTRY: ghcr.io/bpalermo/aether

jobs:
  chart-version-bump:
    # Any change under charts/<name>/ must bump that chart's Chart.yaml version.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history so the PR base commit is reachable for the diff.
          fetch-depth: 0
      - name: Require a Chart.yaml version bump for chart changes
        run: hack/check-chart-version-bump.sh "${{ github.event.pull_request.base.sha }}"

  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup LLVM runtime libs
        uses: ./.github/actions/setup-llvm-libs
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
      - name: Test
        run: |
          bazel test --config=ci --test_output=errors --test_tag_filters=-integration //...
