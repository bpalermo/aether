name: ci

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "proxy/**"

permissions:
  contents: read

env:
  IMAGE_REGISTRY: ghcr.io/bpalermo/aether

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup LLVM runtime libs
        uses: ./.github/actions/setup-llvm-libs
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
      - name: Test
        run: |
          bazel test --config=ci --test_output=errors --test_tag_filters=-integration //...
