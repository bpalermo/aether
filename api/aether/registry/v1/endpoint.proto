syntax = "proto3";

package aether.registry.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/bpalermo/aether/api/aether/registry/v1;registryv1";

message ServiceEndpoint {
  string ip = 1 [(buf.validate.field).string.min_len = 1];

  string cluster_name = 2 [(buf.validate.field).string.min_len = 1];

  uint32 port = 3 [(buf.validate.field).uint32.lte = 65535];

  uint32 weight = 4 [(buf.validate.field).uint32.gte = 0];

  message Locality {
    string region = 1;
    string zone = 2;
  }

  Locality locality = 5;

  map<string, string> metadata = 6;

  message ContainerMetadata {
    string container_id = 1 [(buf.validate.field).string.min_len = 1];
    string network_namespace = 2 [(buf.validate.field).string.min_len = 1];
  }

  ContainerMetadata container_metadata = 7;

  message KubernetesMetadata {
    string namespace = 1 [(buf.validate.field).string.min_len = 1];
    string pod_name = 2 [(buf.validate.field).string.min_len = 1];
    string node_name = 3 [(buf.validate.field).string.min_len = 1];
    // node_ip is the InternalIP of the node hosting this endpoint. Consumers use
    // it as the HBONE-style tunnel target (node_ip:15008) to reach the node's
    // CONNECT listener, which forwards to the destination pod. Stamped by the
    // node-local agent at registration.
    string node_ip = 4;
  }

  KubernetesMetadata kubernetes_metadata = 8;

  // Health reflects whether the endpoint's application is serving, as actively
  // health-checked by the node-local agent (delegated liveness). The default
  // (HEALTH_UNSPECIFIED) is treated as healthy so endpoints from older agents and
  // freshly registered endpoints route normally until proven otherwise.
  enum Health {
    HEALTH_UNSPECIFIED = 0;
    HEALTH_HEALTHY = 1;
    HEALTH_UNHEALTHY = 2;
  }

  Health health = 9;
}
