edition = "2023";

package aether.cni.v1;

import "buf/validate/validate.proto";
import "google/protobuf/wrappers.proto";

// Preserve proto3 implicit field presence so the generated Go/C++ API is
// unchanged by the edition migration (scalars stay value types, not pointers).
option features.field_presence = IMPLICIT;
option go_package = "github.com/bpalermo/aether/api/aether/cni/v1;cniv1";

message CNIPod {
  string name = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];

  string namespace = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];

  string network_namespace = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];

  string container_id = 4 [(buf.validate.field).required = true];

  repeated string ips = 5;

  map<string, string> labels = 6;

  map<string, string> annotations = 7;

  google.protobuf.UInt32Value pid = 8;

  string service_account = 9;

  // terminating is set by the agent when the Kubernetes pod's deletionTimestamp
  // appears (deletion *requested*, before SIGTERM reaches the app). A
  // terminating pod's endpoint is deregistered immediately so new requests stop
  // routing to it while in-flight ones drain through the grace period; the
  // liveness loop must never re-register it. Local xDS resources stay until the
  // CNI DEL performs final teardown.
  bool terminating = 10;
}
