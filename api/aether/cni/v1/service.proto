edition = "2023";

package aether.cni.v1;

import "api/aether/cni/v1/cni.proto";
import "buf/validate/validate.proto";

// Preserve proto3 implicit field presence so the generated Go/C++ API is
// unchanged by the edition migration (scalars stay value types, not pointers).
option features.field_presence = IMPLICIT;
option go_package = "github.com/bpalermo/aether/api/aether/cni/v1;cniv1";

service CNIService {
  rpc AddPod(AddPodRequest) returns (AddPodResponse) {}
  rpc RemovePod(RemovePodRequest) returns (RemovePodResponse) {}
}

message AddPodRequest {
  CNIPod pod = 1;
}

message AddPodResponse {
  enum Result {
    RESULT_UNSPECIFIED = 0;
    RESULT_SUCCESS = 1;
    RESULT_ERROR = 2;
  }

  Result result = 1;
}

message RemovePodRequest {
  string name = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];

  string namespace = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];

  string container_id = 4 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];
}

message RemovePodResponse {
  enum Result {
    RESULT_UNSPECIFIED = 0;
    RESULT_SUCCESS = 1;
    RESULT_ERROR = 2;
  }

  Result result = 1;
}
