edition = "2024";

package aether.config.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/bpalermo/aether/api/aether/config/v1;configv1";

// EdgeRouteSpec is the `.spec` of the EdgeRoute custom resource: one external
// (north-south) hostname -> mesh service mapping consumed by the edge proxy. The
// edge watches EdgeRoutes, routes each `hosts` entry to the named mesh `service`
// (optionally a specific `port`), and scopes its registrar watch to exactly the
// referenced services. It is validated with protovalidate.
//
// The mesh `service` is the service's ServiceAccount name (the registry key), not
// a Kubernetes Service object — the edge dials the service's pods directly over
// mTLS, the same path every mesh client uses. The typed EdgeRoute CRD wrapper
// (TypeMeta/ObjectMeta/Spec/Status) is hand-written in edgeroute_types.go. See
// docs/proposals/003_edge-proxy.md.
message EdgeRouteSpec {
  // External hostnames (Host/SNI) routed to the service. At least one is
  // required: the edge routes ONLY by explicit external host. The internal mesh
  // FQDN (<service>.<mesh-domain>) is deliberately NOT routable from the edge —
  // it is the mesh's east-west addressing scheme, not a north-south entrypoint.
  repeated string hosts = 1 [(buf.validate.field).repeated = {
    min_items: 1
    items: {string: {hostname: true}}
  }];

  // Mesh service name (= ServiceAccount = registry key) this route exposes.
  string service = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 253
  }];

  // Destination port. Unset (0) routes to the service's default port; a non-zero
  // value routes to that advertised port (multi-port routing, proposal 005).
  uint32 port = 3 [(buf.validate.field).uint32.lte = 65535];

  // Downstream TLS for this route's hosts. Unset = the edge serves the route over
  // plain HTTP (or behind the shared HTTPS listener with no cert for these hosts).
  EdgeRouteTLS tls = 4;
}

// EdgeRouteTLS references the certificate the edge presents for this route's
// hostnames (SNI-selected). The cert is BYO — created by cert-manager, kubectl,
// or any tool — and resolved by a SecretProvider; aether does not issue it.
message EdgeRouteTLS {
  // Provider-specific reference to the certificate (for the kubernetes provider,
  // the name of a `kubernetes.io/tls` Secret in the watched namespace).
  string secret_name = 1 [(buf.validate.field).string.min_len = 1];

  // Which SecretProvider resolves secret_name. Unspecified = kubernetes.
  SecretProvider provider = 2 [(buf.validate.field).enum.defined_only = true];
}

// SecretProvider selects the backend that resolves an EdgeRouteTLS.secret_name to
// certificate material. The edge registers a Provider implementation per value;
// new backends are added here and implemented in agent/internal/edge/secret.
enum SecretProvider {
  // Defaults to the kubernetes provider.
  SECRET_PROVIDER_UNSPECIFIED = 0;
  // A `kubernetes.io/tls` Secret read via the Kubernetes API.
  SECRET_PROVIDER_KUBERNETES = 1;
  // AWS Secrets Manager (reserved; not implemented yet).
  SECRET_PROVIDER_AWS_SECRETS_MANAGER = 2;
}
