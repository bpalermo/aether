edition = "2024";

package aether.config.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/bpalermo/aether/api/aether/config/v1;configv1";

// VirtualHostSpec is the `.spec` of the VirtualHost custom resource: one external
// (north-south) FQDN (or wildcard) carrying an ordered list of path-matched
// routes to mesh services, consumed by the edge proxy. The edge watches
// VirtualHosts, projects each into one Envoy virtual host (hosts -> domains,
// routes -> ordered Envoy routes), and scopes its registrar watch to the
// referenced backend services. Validated with protovalidate.
//
// A backend `service` is the service's ServiceAccount name (the registry key),
// not a Kubernetes Service object — the edge dials the service's pods directly
// over mTLS, the same path every mesh client uses. The typed VirtualHost CRD
// wrapper (TypeMeta/ObjectMeta/Spec/Status) is hand-written in
// virtualhost_types.go. See docs/proposals/017_virtual-host-l7-routing.md.
message VirtualHostSpec {
  // External hostnames (Host/SNI) this virtual host serves. Each entry is an
  // exact FQDN (api.example.com) or a leading-wildcard suffix (*.example.com).
  // At least one is required and entries are unique within the manifest;
  // uniqueness ACROSS manifests is enforced by the controller validating webhook.
  // The edge routes ONLY by explicit external host — the internal mesh FQDN
  // (<service>.<mesh-domain>) is never routable from the edge.
  repeated string hosts = 1 [(buf.validate.field).repeated = {
    min_items: 1
    unique: true
    items: {
      string: {
        min_len: 1
        max_len: 253
        pattern: "^(\\*\\.)?([a-z0-9]([-a-z0-9]*[a-z0-9])?\\.)*[a-z0-9]([-a-z0-9]*[a-z0-9])?$"
      }
    }
  }];

  // Ordered routes. The edge emits them in this order and Envoy evaluates them
  // top-down, first match wins — order by specificity (longer prefixes first,
  // the catch-all "/" last). At least one route is required.
  repeated HTTPRoute routes = 2 [(buf.validate.field).repeated.min_items = 1];

  // Downstream TLS for this virtual host's hosts (SNI-selected). Unset = served
  // over plain HTTP (or behind the shared HTTPS listener with no cert).
  VirtualHostTLS tls = 3;
}

// HTTPRoute is one match -> backend rule within a VirtualHost.
message HTTPRoute {
  // Request match. Required.
  RouteMatch match = 1 [(buf.validate.field).required = true];

  // Destination mesh service. Required.
  RouteBackend backend = 2 [(buf.validate.field).required = true];
}

// RouteMatch selects requests by path. v1 supports a path prefix or an exact
// path; regex / header / method matching is a later addition (proposal 017
// Phase 2).
message RouteMatch {
  oneof path {
    option (buf.validate.oneof).required = true;

    // Path prefix (Envoy prefix match), e.g. "/users". "/" matches everything.
    string prefix = 1 [(buf.validate.field).string.min_len = 1];

    // Exact path (Envoy path match), e.g. "/healthz".
    string exact = 2 [(buf.validate.field).string.min_len = 1];
  }
}

// RouteBackend is the mesh service a matched request is forwarded to.
message RouteBackend {
  // Mesh service name (= ServiceAccount = registry key).
  string service = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 253
  }];

  // Destination port. Unset (0) routes to the service's default port; a non-zero
  // value routes to that advertised port (multi-port routing, proposal 005).
  uint32 port = 2 [(buf.validate.field).uint32.lte = 65535];
}

// VirtualHostTLS references the certificate the edge presents for this virtual
// host's hostnames (SNI-selected). The cert is BYO — created by cert-manager,
// kubectl, or any tool — and resolved by a SecretProvider; aether does not issue
// it. A wildcard cert (*.example.com) is matched against the request SNI natively.
message VirtualHostTLS {
  // Provider-specific reference to the certificate (for the kubernetes provider,
  // the name of a `kubernetes.io/tls` Secret in the watched namespace).
  string secret_name = 1 [(buf.validate.field).string.min_len = 1];

  // Which SecretProvider resolves secret_name. Unspecified = kubernetes.
  SecretProvider provider = 2 [(buf.validate.field).enum.defined_only = true];
}

// SecretProvider selects the backend that resolves a VirtualHostTLS.secret_name
// to certificate material. The edge registers a Provider implementation per
// value; new backends are added here and implemented in agent/internal/edge/secret.
enum SecretProvider {
  // Defaults to the kubernetes provider.
  SECRET_PROVIDER_UNSPECIFIED = 0;
  // A `kubernetes.io/tls` Secret read via the Kubernetes API.
  SECRET_PROVIDER_KUBERNETES = 1;
  // AWS Secrets Manager (reserved; not implemented yet).
  SECRET_PROVIDER_AWS_SECRETS_MANAGER = 2;
}
