apiVersion: v1
kind: ServiceAccount
metadata:
  name: echo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo
  labels:
    app: echo
spec:
  replicas: 1
  # Surge a new Ready pod before terminating the old one (maxUnavailable: 0) so a
  # single-replica rollout never leaves the Service with zero ready endpoints — the
  # source of the ~6-54 transient 503s seen on echo during the redirect-all soak
  # (2026-06-29). The mesh drains the terminating pod via its deletionTimestamp watch.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: echo
  template:
    metadata:
      labels:
        app: echo
        aether.io/managed: "true"
    spec:
      serviceAccountName: echo
      # Hold the pod briefly after deletion is requested so endpoint deregistration
      # (mesh EDS DRAINING) + in-flight requests settle before SIGTERM. Native sleep
      # preStop (k8s >=1.29) — the distroless echo-basic image has no shell. Pairs
      # with the surge strategy above for hitless single-replica rollouts.
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: echo
          image: gcr.io/k8s-staging-gateway-api/echo-basic@sha256:eb7396722956640221e856b8e8cf44179da131d5bd6fc27a4f0cb91f60c237c3
          env:
            - name: HTTP_PORT
              value: "8080"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - containerPort: 8080
          lifecycle:
            preStop:
              sleep:
                seconds: 5
          resources:
            requests:
              cpu: 10m
          securityContext:
            privileged: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
