# Example VirtualHosts for the edge proxy e2e (proposal 017). Apply into the
# edge's watched namespace (default: the edge pod's own namespace, aether-edge).
#
# A VirtualHost maps one external FQDN (or wildcard) to an ordered list of
# path-matched routes to mesh services. The internal mesh FQDN
# (<service>.aether.internal) is deliberately NOT routable from the edge.
---
apiVersion: config.aether.io/v1
kind: VirtualHost
metadata:
  name: api
  namespace: aether-edge
spec:
  # External hostnames (Host/SNI) this virtual host serves (required, >=1).
  # Exact FQDN or a leading-wildcard suffix (*.example.com).
  hosts:
    - api.example.com
  # Per-host downstream cert (SNI-selected, hot-rotated). The Secret is BYO
  # (cert-manager, kubectl, ...); a *.example.com wildcard cert matches the SNI.
  tls:
    secretName: example-tls
    provider: SECRET_PROVIDER_KUBERNETES
  # Ordered routes — first match wins. Order by specificity (catch-all "/" last).
  # `service` is the mesh service = its ServiceAccount = the registry key; the
  # edge dials its pods directly over mTLS.
  routes:
    - match:
        prefix: /grpc
      backend:
        service: svc-5
        # Multi-port routing (proposal 005): target a specific advertised port.
        port: 3001
    - match:
        exact: /healthz
      backend:
        service: svc-2
    - match:
        prefix: /
      backend:
        service: svc-1
