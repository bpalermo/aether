apiVersion: v1
kind: Namespace
metadata:
  name: gateway-conformance-mesh-consumer
  labels:
    aether.io/managed: "true"
    gateway-conformance: mesh-consumer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-v1
  namespace: gateway-conformance-mesh-consumer
  labels:
    app: echo
spec:
  selector:
    matchLabels:
      app: echo
