[package]
name = "aether_stats"
version = "0.1.0"
edition = "2021"
description = "Aether stats Envoy dynamic module — source->destination request metrics (proposal 007)"
license = "Apache-2.0"

[dependencies]
# ABI-pinned to the proxy image (charts/agent/values.yaml). The SDK's build
# script generates the ABI bindings from the Envoy abi.h in the same checkout,
# so this tag must match the Envoy version exactly. Not vendored — fetched at
# the pinned tag. See proposal 007.
envoy-proxy-dynamic-modules-rust-sdk = { git = "https://github.com/envoyproxy/envoy", tag = "v1.38.0" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[lib]
name = "aether_stats"
crate-type = ["cdylib"]
