schemaVersion: "2.0.0"

# Smoke checks for the custom aether-proxy image (//:image_test).
fileExistenceTests:
  - name: envoy binary
    path: /usr/local/bin/envoy
    shouldExist: true
    permissions: "-rwxr-xr-x"

metadataTest:
  entrypoint: ["/usr/local/bin/envoy"]

commandTests:
  - name: envoy version
    command: /usr/local/bin/envoy
    args: ["--version"]
    expectedOutput: [".*1\\.38\\.0.*"]
