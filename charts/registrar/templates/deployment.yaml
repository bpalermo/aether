apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "registrar.fullname" . }}
  namespace: {{ include "registrar.namespace" . }}
  labels:
    {{- include "registrar.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "registrar.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "registrar.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "registrar.serviceAccountName" . }}
      containers:
        - name: registrar
          image: {{ .Values.image.ref | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--debug={{ .Values.debug }}"
            - "--cluster-name={{ .Values.clusterName }}"
            # Mesh-wide policy (telemetry, SPIRE on/off) is read from the mounted
            # MeshConfig ConfigMap (projected from the MeshConfig CR by the
            # aether-controller), default path /etc/aether/mesh-config.yaml.
            - "--registry-backend={{ .Values.registryBackend }}"
            {{- if eq .Values.registryBackend "etcd" }}
            - "--etcd-endpoints={{ join "," .Values.etcd.endpoints }}"
            {{- end }}
            - "--grpc-address=:{{ .Values.service.targetPort }}"
            {{- if .Values.spire.enabled }}
            {{- with .Values.spire.trustDomain }}
            - "--spire-trust-domain={{ . }}"
            {{- end }}
            - "--spire-workload-socket={{ .Values.spire.workloadSocketPath }}"
            {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
            - name: metrics
              containerPort: 8081
              protocol: TCP
            - name: health
              containerPort: 8082
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.aws.credentialsSecret }}
          envFrom:
            - secretRef:
                name: {{ . }}
          {{- end }}
          env:
            {{- with .Values.aws.region }}
            - name: AWS_REGION
              value: {{ . | quote }}
            {{- end }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Stamped onto every OTel signal (metrics/traces/logs) via
            # resource.WithFromEnv(), so logs are filterable per pod in
            # VictoriaLogs. Refs the env vars defined above ($(VAR) expansion).
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "k8s.pod.name=$(POD_NAME),k8s.namespace.name=$(POD_NAMESPACE)"
            - name: GOMEMLIMIT
              valueFrom:
                resourceFieldRef:
                  resource: limits.memory
                  divisor: "1"
            - name: GOMAXPROCS
              valueFrom:
                resourceFieldRef:
                  resource: limits.cpu
                  divisor: "1"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: mesh-config
              mountPath: /etc/aether
              readOnly: true
            {{- if .Values.spire.enabled }}
            - name: workload-socket
              mountPath: /run/secrets/workload-spiffe-uds
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: mesh-config
          # Projected from the MeshConfig CR by the aether-controller. The name is
          # derived from the release (no chart value); the pod waits in
          # ContainerCreating until it exists. See proposal 015.
          configMap:
            name: {{ include "registrar.meshConfigMapName" . }}
        {{- if .Values.spire.enabled }}
        - name: workload-socket
          csi:
            driver: "csi.spiffe.io"
            readOnly: true
        {{- end }}
