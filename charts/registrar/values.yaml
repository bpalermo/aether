# Default values for the registrar chart.

# Override the chart name / fully-qualified resource name. Resource names are
# release-prefixed so multiple releases can coexist; use these to customize that.
nameOverride: ""
fullnameOverride: ""

# Namespace the registrar resources are deployed into. Defaults to the release
# namespace when `name` is empty. The agent chart owns the namespace by default,
# so creation is off here; enable it for a standalone registrar install.
namespace:
  create: false
  name: ""

# Cluster name passed to the registrar (`--cluster-name`).
clusterName: talos-main

# OTel telemetry, push-first: when otlpEndpoint is set, the registrar pushes
# metrics (and traces when tracing.enabled) to the collector.
telemetry:
  # Enables the OTel MeterProvider (`--otel-enabled`).
  enabled: false
  # OTLP gRPC collector endpoint (host:port, insecure). Empty disables push.
  otlpEndpoint: ""
  tracing:
    # Enables OTLP trace export (`--tracing-enabled`); requires otlpEndpoint.
    enabled: false
    # Head-sampling ratio for traces (`--trace-sample-rate`).
    sampleRate: 0.1

# Registry backend (`--registry-backend`): kubernetes, dynamodb, etcd.
registryBackend: kubernetes

# AWS configuration for the dynamodb registry backend.
aws:
  # Region for AWS SDK clients (exported as AWS_REGION).
  region: us-east-1
  # Name of an existing Secret holding AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY.
  # Empty = inject nothing (rely on IRSA / instance role / ambient credentials).
  credentialsSecret: ""

# etcd settings (used when registryBackend == etcd).
etcd:
  # etcd client endpoints (`--etcd-endpoints`), e.g.
  # ["http://etcd.aether-etcd.svc.cluster.local:2379"].
  endpoints: []

# Enable verbose logging (`--debug`).
debug: true

# 2 replicas ALWAYS (directive 2026-06-11): both serve gRPC and sync the
# external registry independently, so the multi-replica write-behind topology
# is permanently exercised rather than a theoretical configuration.
replicaCount: 2

image:
  # Substituted at package time with the digest-pinned reference produced by
  # the in-repo `//registrar/cmd/registrar:image_push` target.
  ref: "{@//registrar/cmd/registrar:image_push}"
  pullPolicy: Always

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 64Mi

service:
  port: 443
  targetPort: 8443

# SPIRE mTLS for the registrar gRPC server. When enabled, the csi.spiffe.io
# Workload API socket is mounted and the registrar fetches its X.509 SVID over it
# (no certificate files / sidecar needed).
spire:
  enabled: true
  # SPIFFE trust domain authorized for mTLS peers. Leave empty to omit the flag
  # and let the binary default (ROOTCA) authorize any peer chaining to the SPIRE
  # root CA; set e.g. "aether.internal" to restrict peers to that trust domain.
  trustDomain: ""
  # Workload API socket path (the csi.spiffe.io mount + socket filename).
  workloadSocketPath: /run/secrets/workload-spiffe-uds/socket
