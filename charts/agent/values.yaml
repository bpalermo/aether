# Default values for the agent chart.

# Override the chart name / fully-qualified resource name. Resource names are
# release-prefixed so multiple releases can coexist; use these to customize that.
nameOverride: ""
fullnameOverride: ""

# Namespace the agent resources are deployed into. Defaults to the release
# namespace when `name` is empty. When `create` is true the chart renders the
# namespace (with privileged pod-security labels, required by the agent's
# hostNetwork + NET_ADMIN privileges).
#
# NOTE: the agent DaemonSet is effectively singleton-per-node — it owns host
# paths (/run/aether, /opt/cni/bin, /etc/cni/net.d, ...) and the CNI plugin, so
# only one agent release should target a given set of nodes regardless of the
# release-aware templating below.
namespace:
  create: true
  name: ""

# Cluster name passed to the agent (`--cluster-name`).
clusterName: talos-main

# Mesh-wide policy (mesh domain, telemetry posture, SPIRE on/off) is NO LONGER
# set here — it lives in the MeshConfig custom resource owned by the
# aether-controller chart, which projects it into a ConfigMap the agent mounts.
# See docs/proposals/015_mesh-config.md.
meshConfig:
  # Name of the ConfigMap the aether-controller projects the MeshConfig CR into
  # and that the agent mounts at /etc/aether. Must match the controller chart's
  # meshConfig.configMapName (and share the agent's namespace).
  configMapName: aether-mesh-config
  # Envoy/CNI data-plane plumbing (template-time, NOT a runtime agent flag): the
  # proxy bootstrap stats sink and the CNI plugin netconf push to this OTLP
  # collector. The agent's OWN runtime OTLP posture lives in the MeshConfig CR;
  # keep this consistent with that CR's telemetry.otlpEndpoint.
  telemetry:
    # OTLP gRPC collector endpoint (host:port, insecure), e.g.
    # "otel-collector.observability.svc:4317". Empty disables the proxy stat sink
    # and the CNI netconf endpoint.
    otlpEndpoint: ""

# Enable verbose logging on the agent and cni-install containers (`--debug`).
debug: true

agent:
  image:
    # Substituted at package time with the digest-pinned reference produced by
    # the in-repo `//agent/cmd/agent:image_push` target, e.g.
    # ghcr.io/bpalermo/aether/agent@sha256:...
    ref: "{@//agent/cmd/agent:image_push}"
    pullPolicy: Always
  resources:
    requests:
      cpu: 200m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 64Mi

cniInstall:
  image:
    ref: "{@//cni/cmd/cni-install:image_push}"
    pullPolicy: Always
  resources:
    requests:
      cpu: 100m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 32Mi

# Per-node Envoy proxy DaemonSet. Disable to deploy only the agent.
proxy:
  enabled: true
  image:
    # Custom aether-proxy = distroless/cc base + custom Envoy binary. Built by the
    # separate //proxy Bazel workspace (proposal 010) and published to
    # ghcr.io/bpalermo/aether/aether-proxy by proxy-release, tagged with the
    # publishing commit SHA (multi-arch manifest). This `ref` is auto-pinned to
    # that SHA by proxy-release (a bump-chart PR) on each proxy release — an
    # immutable pin (the :dev placeholder below is just the pre-first-release seed).
    ref: "ghcr.io/bpalermo/aether/aether-proxy:d86328b772ee5f6bf86fcd725eff0e2ff3e645f3"
    pullPolicy: Always
  logLevel: info
  # Emit Envoy's own application (operational) logs as one JSON object per line
  # so the node log pipeline can parse them structurally instead of scraping the
  # default `[ts][thread][level][name] file:line msg` text. Wired via the
  # bootstrap `application_log_config` (the supported JSON path), NOT a
  # `--log-format` CLI flag — Envoy rejects setting both. Set false to fall back
  # to Envoy's default text format.
  jsonLogs: true
  # Envoy hot restart. The proxy DaemonSet always runs the agent's
  # proxy-supervisor as the container entrypoint (PID 1): it forks Envoy across
  # restart epochs and, on a surge upgrade, hot-restarts the new pod's Envoy from
  # the old pod's across the pod boundary (shared host netns + hostPath /dev/shm +
  # per-node epoch coordination + a readiness gate). The DaemonSet uses a
  # maxSurge=1/maxUnavailable=0 update strategy so the successor takes over before
  # the predecessor is removed — connection-preserving. See
  # docs/proposals/001_proxy-hot-restart.md. Only the tunables below are
  # configurable; the mechanism itself is not optional.
  hotRestart:
    # Envoy --base-id, pinned so successive epochs share one shared-memory segment.
    baseId: 0
    # Envoy --drain-time-s / --parent-shutdown-time-s (parent must exceed drain).
    # The successor pod holds readiness for ~parentShutdownTime (until its Envoy
    # terminates the predecessor), so keep these modest.
    drainTime: 10s
    parentShutdownTime: 15s
    # Watchdogs: a hot-restart epoch that never reaches LIVE within handoffDeadline
    # of launch, or an admin endpoint unreachable for adminUnresponsiveDeadline
    # after having been LIVE, means the successor's main thread is wedged in a
    # blocking hot-restart RPC against a dead parent; the supervisor exits non-zero
    # so the pod is recreated. 0 = built-in defaults (2m / 30s).
    handoffDeadline: 0
    adminUnresponsiveDeadline: 0
    # Host tmpfs dir shared across overlapping pods on a node, mounted at /dev/shm;
    # holds the hot-restart shared-memory segment (gauges/counters).
    shmHostPath: /run/aether/shm
  # Proxy container resources. Previously unset (fully unbounded): a leaking
  # Envoy could eat the node until the kubelet itself flapped (observed
  # 2026-06-11, 3.5 GiB RSS) instead of being contained by an OOM kill, which
  # the cross-pod hot-restart machinery recovers from with a bounded blip.
  # Memory request == limit (Guaranteed for the data plane's memory); CPU is
  # requested but deliberately UNLIMITED — throttling the data plane under
  # load turns CPU contention into latency and failed health checks.
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      memory: 512Mi
  # Envoy overload manager: a graceful-degradation ladder (shrink heap ->
  # close idle/keepalive downstream connections -> scale idle timeouts down
  # -> 503 new requests -> stop accepting connections) that engages well
  # before the memory limit's OOM kill. Inert in normal operation: steady-
  # state heap sits far below the first (0.80) rung.
  overload:
    enabled: true
    # Heap budget for the fixed_heap monitor. Keep at ~75% of
    # resources.limits.memory (bump BOTH together): heap excludes the
    # supervisor process, kernel socket buffers and thread stacks, and the
    # ladder's top rung must engage below the real OOM line. (cgroup_memory
    # would avoid this coupling but is unusable in the privileged proxy pod
    # — host cgroup namespace; see the bootstrap ConfigMap comment.)
    maxHeapSizeBytes: 402653184 # 384Mi = 75% of 512Mi

# AWS credentials consumed by the agent (DynamoDB registry backend).
# The chart never bakes credentials into the image. By default it references an
# existing secret; set `create: true` and supply the keys to have the chart
# render the Secret instead.
awsCredentials:
  create: false
  # Defaults to "<release>-aether-agent-aws-credentials" when empty.
  secretName: ""
  accessKeyId: ""
  secretAccessKey: ""

# SPIRE integration. When enabled, the agent:
#   * fetches its own X.509 SVID over the csi.spiffe.io Workload API socket for
#     mTLS to the registrar (workloadSocketPath), and
#   * connects to the SPIRE agent admin socket and uses the Delegated Identity
#     API to mint SVIDs for the local Envoy proxies, serving them over SDS.
spire:
  enabled: true
  # SPIFFE trust domain authorized for mTLS peers. Leave empty to omit the flag
  # The SPIFFE trust domain is always meshDomain: mesh addressing
  # (<svc>.<meshDomain>) and workload identity (spiffe://<meshDomain>/...)
  # are one domain by design and cannot be split.
  # Workload API socket (the csi.spiffe.io mount + socket filename).
  workloadSocketPath: /run/secrets/workload-spiffe-uds/socket
  # SPIRE agent admin socket (Delegated Identity API). Requires the SPIRE agent
  # to expose its admin socket on the host and to authorize the agent's SVID as a
  # delegate. `hostPath` is the node directory exposing the admin socket; it is
  # bind-mounted at `mountPath`, and the socket file is `mountPath/socketName`.
  adminSocket:
    # Host path where the SPIRE agent exposes its admin socket. With the spiffe
    # spire chart this is sockets.hostBasePath + "/csi.spiffe.io/admin" when
    # spire-agent.sockets.admin.mountOnHost=true.
    hostPath: /run/spire/agent/sockets/csi.spiffe.io/admin
    mountPath: /run/spire/admin-sockets
    socketName: admin.sock
