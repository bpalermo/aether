{{- if .Values.proxy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent.proxy.configMapName" . }}
  namespace: {{ include "agent.namespace" . }}
  labels:
    {{- include "agent.proxy.labels" . | nindent 4 }}
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 9901

    # Bound stats-memory growth (measured 2026-06-11: ~5.1k stats/proxy at
    # 7 pods + 8 services; per-pod clusters/listeners dominate). Nothing
    # scrapes the Envoy admin — delegated liveness rides the health-gateway
    # listener and the supervisor only polls /server_info. Excluded stats
    # are null (not rendered, not allocated, increments AND READS are
    # no-ops).
    #
    # ⚠ Excluded stats are not write-only: Envoy internals READ stats too.
    # NEVER exclude cluster.health_* — the health_check filter evaluates
    # cluster_min_healthy_percentages by reading the cluster's
    # membership_healthy/membership_total GAUGES; excluding them nulls both
    # to 0, the gateway and every inbound readiness path answer 503, the
    # liveness loop demotes every endpoint, and with panic routing at 0 the
    # whole mesh goes dark (2026-06-11 20:03-20:14Z outage, rev 70; repro'd
    # in isolation against the same image). cluster.app_* carries no
    # min-healthy reference (verified: only health_<pod> clusters appear in
    # ClusterMinHealthyPercentages) and stays excluded.
    #
    # NOTE: probe clusters never carry routed traffic, so Envoy's HC
    # interval selection sees them as no-traffic regardless; the agent pins
    # no_traffic_interval == interval on them (cluster.go) — keep that pin.
    stats_config:
      # No scraper exists; skip default tag extraction (saves per-stat tag
      # structs and admin /stats render time, which runs on the main thread).
      use_all_default_tags: false
      stats_matcher:
        exclusion_list:
          patterns:
            # Per-pod delivery clusters: O(pods) x ~115 stats. Do NOT add
            # cluster.health_ here — see the outage note above.
            - prefix: "cluster.app_"
            # Certificate expiration gauges: SPIRE owns rotation/expiry.
            - contains: "ssl.certificate."
            # Per-cluster active-HC verbose stats (attempt/success/failure
            # counters); membership_healthy/membership_total are not under
            # this subtree and remain readable. RE2 only — no lookahead.
            - safe_regex:
                regex: "^cluster\\..*\\.health_check\\."

{{- if .Values.proxy.overload.enabled }}
    # Graceful degradation BEFORE the container memory limit OOM-kills Envoy:
    # shed the cheapest state first (free heap, then idle downstream
    # connections), then stop accepting new work. stop_accepting_requests
    # 503s new streams, which the mesh's client retry policy retries on a
    # DIFFERENT endpoint — an overloaded node sheds load to other replicas.
    # The agent-generated health-gateway listener sets
    # bypass_overload_manager so delegated liveness keeps reporting APP
    # truth (not proxy state) and the registry never flaps on transient
    # overload.
    overload_manager:
      refresh_interval: 0.25s
      resource_monitors:
        # fixed_heap (tcmalloc-internal), NOT cgroup_memory. cgroup_memory
        # reads /sys/fs/cgroup/memory.{current,max}, which works in docker
        # (private cgroup namespace: the container sees its own leaf cgroup)
        # but NOT in this DaemonSet: the proxy is a privileged pod, which
        # gets the HOST cgroup namespace — /sys/fs/cgroup is the host root
        # cgroup, where memory.max does not exist. Envoy then aborts at
        # bootstrap with "No supported cgroup memory implementation found",
        # and the config-watching supervisors hot-restarted every node into
        # the poisoned config simultaneously (cluster-wide data-plane outage,
        # 2026-06-11 ~12:50Z, rev 64). Do not reintroduce cgroup_memory
        # unless the proxy stops being privileged or gains a private
        # cgroupns. Keep maxHeapSizeBytes at ~75% of
        # proxy.resources.limits.memory: the heap excludes the supervisor
        # process, kernel socket buffers and thread stacks, and the top rung
        # must engage below the real OOM line.
        - name: "envoy.resource_monitors.fixed_heap"
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.resource_monitors.fixed_heap.v3.FixedHeapConfig
            max_heap_size_bytes: {{ int64 .Values.proxy.overload.maxHeapSizeBytes }}
      actions:
        - name: "envoy.overload_actions.shrink_heap"
          triggers:
            - name: "envoy.resource_monitors.fixed_heap"
              threshold:
                value: 0.80
        - name: "envoy.overload_actions.disable_http_keepalive"
          triggers:
            - name: "envoy.resource_monitors.fixed_heap"
              threshold:
                value: 0.90
        - name: "envoy.overload_actions.reduce_timeouts"
          typed_config:
            "@type": type.googleapis.com/envoy.config.overload.v3.ScaleTimersOverloadActionConfig
            timer_scale_factors:
              - timer: HTTP_DOWNSTREAM_CONNECTION_IDLE
                min_timeout: 2s
          triggers:
            - name: "envoy.resource_monitors.fixed_heap"
              scaled:
                scaling_threshold: 0.85
                saturation_threshold: 0.95
        - name: "envoy.overload_actions.stop_accepting_requests"
          triggers:
            - name: "envoy.resource_monitors.fixed_heap"
              threshold:
                value: 0.95
        - name: "envoy.overload_actions.stop_accepting_connections"
          triggers:
            - name: "envoy.resource_monitors.fixed_heap"
              threshold:
                value: 0.98
{{- end }}

    dynamic_resources:
      ads_config:
        api_type: DELTA_GRPC
        grpc_services:
          - envoy_grpc:
              cluster_name: agent_xds
      cds_config:
        ads: {}
      lds_config:
        ads: {}

    static_resources:
      clusters:
      - name: agent_xds
        type: STATIC
        load_assignment:
          cluster_name: local_xds
          endpoints:
            - lb_endpoints:
                - endpoint:
                    address:
                      pipe:
                        path: /run/aether/xds.sock
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            explicit_http_config:
              http2_protocol_options:
                connection_keepalive:
                  interval: 15s
                  timeout: 5s
                initial_stream_window_size: 1048576    # 1 MiB
                initial_connection_window_size: 1048576 # 1 MiB
                max_concurrent_streams: 10
{{- end }}
