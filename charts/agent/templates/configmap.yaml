{{- if .Values.proxy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent.proxy.configMapName" . }}
  namespace: {{ include "agent.namespace" . }}
  labels:
    {{- include "agent.proxy.labels" . | nindent 4 }}
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 9901

{{- if .Values.proxy.jsonLogs }}
    # Emit Envoy's own application logs as one JSON object per line. This is the
    # supported JSON path (vs a raw --log-format string): %j escapes the message
    # as a JSON string and the trailing %* (added by Envoy) injects any
    # ENVOY_TAGGED_LOG key/values as sibling fields. %v and %_ are NOT allowed in
    # JSON format. Mutually exclusive with the --log-format CLI flag, which the
    # proxy command intentionally does not pass.
    application_log_config:
      log_format:
        json_format:
          time: "%Y-%m-%dT%T.%e%z"
          level: "%l"
          name: "%n"
          thread: "%t"
          source: "%g:%#"
          message: "%j"
{{- end }}

{{- if .Values.global.otel.endpoint }}
    # Push Envoy stats to the OTel collector over OTLP. Push-first like the
    # rest of the mesh telemetry: the admin /stats endpoint renders on Envoy's
    # MAIN thread (100-500ms at scale), so it must never be scraped — the sink
    # serializes off the flush path instead. Stats stay bounded by the
    # stats_config exclusions below.
    stats_sinks:
      - name: envoy.stat_sinks.open_telemetry
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.stat_sinks.open_telemetry.v3.SinkConfig
          grpc_service:
            envoy_grpc:
              cluster_name: otel_collector
          # Populate the OTLP Resource with this proxy's k8s identity (OTel
          # semantic-convention k8s.* attributes: node/namespace/pod/uid), sourced
          # from OTEL_RESOURCE_ATTRIBUTES on the container (see proxy.yaml). Without
          # a resource_detector the sink emits an EMPTY resource
          # (open_telemetry_impl.cc builds the resource solely from these
          # detectors), so every proxy's stats land on one identityless series per
          # aether.cluster. That collapse is correct for per-service mesh clusters
          # (bounds cardinality at the node-count target) but breaks the static
          # infra clusters (agent_xds, otel_collector): one such cluster exists per
          # node, so N proxies multiplex N cumulative counters onto a single series
          # and rate()/increase() fabricate phantom resets/cx-fails. The collector
          # promotes k8s.node.name -> a `node` label ONLY for those infra clusters
          # (selective transform/promote), so mesh stats stay collapsed.
          resource_detectors:
            - name: envoy.tracers.opentelemetry.resource_detectors.environment
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.tracers.opentelemetry.resource_detectors.v3.EnvironmentResourceDetectorConfig
          prefix: envoy
          # Export the tag-extracted name with tags as OTLP attributes: one
          # metric family per stat, labeled by aether.cluster (see stats_tags)
          # instead of a name per cluster.
          emit_tags_as_attributes: true
          use_tag_extracted_name: true
          # Drop the "envoy" prefix from JUST the aether_stats request counter so
          # it exports as `aether_requests_total` (not envoy_aether_requests_total)
          # while every standard envoy_* stat keeps the prefix. Envoy's OTLP sink
          # applies ConversionAction.metric_name verbatim — no prefix prepend (see
          # getMetricName in open_telemetry_impl.cc) — so this both strips the
          # prefix and collapses the per-request inlined-name variants into one
          # attribute-labeled metric. Istio's custom-stat-namespace trick is admin
          # /stats/prometheus-only and does not apply to the OTLP sink; this is the
          # OTLP-native equivalent.
          # NOTE: any custom_metric_conversions turns on sink-wide metric
          # AGGREGATION (one Metric, attribute-keyed data points) for ALL stats
          # (enable_metric_aggregation_ = has_custom_metric_conversions). Distinct
          # tag sets stay distinct data points, so Prometheus output is unchanged —
          # validate in e2e before relying on it.
          custom_metric_conversions:
            matcher_list:
              matchers:
                - predicate:
                    single_predicate:
                      input:
                        name: stat_full_name_match_input
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.matching.common_inputs.stats.v3.StatFullNameMatchInput
                      value_match:
                        safe_regex:
                          google_re2: {}
                          # Full stat name carries the inlined tag values
                          # (aether.requests_total.reporter.<v>.…); match them all.
                          regex: "aether\\.requests_total.*"
                  on_match:
                    action:
                      name: otlp_metric_conversion
                      typed_config:
                        "@type": type.googleapis.com/envoy.extensions.stat_sinks.open_telemetry.v3.SinkConfig.ConversionAction
                        metric_name: aether.requests_total
{{- end }}

    # Bound stats-memory growth (measured 2026-06-11: ~5.1k stats/proxy at
    # 7 pods + 8 services; per-pod clusters/listeners dominate). Nothing
    # scrapes the Envoy admin — delegated liveness rides the health-gateway
    # listener and the supervisor only polls /server_info. Excluded stats
    # are null (not rendered, not allocated, increments AND READS are
    # no-ops).
    #
    # ⚠ Excluded stats are not write-only: Envoy internals READ stats too.
    # NEVER exclude cluster.health_* — the health_check filter evaluates
    # cluster_min_healthy_percentages by reading the cluster's
    # membership_healthy/membership_total GAUGES; excluding them nulls both
    # to 0, the gateway and every inbound readiness path answer 503, the
    # liveness loop demotes every endpoint, and with panic routing at 0 the
    # whole mesh goes dark (2026-06-11 20:03-20:14Z outage, rev 70; repro'd
    # in isolation against the same image). cluster.app_* carries no
    # min-healthy reference (verified: only health_<pod> clusters appear in
    # ClusterMinHealthyPercentages) and stays excluded.
    #
    # NOTE: probe clusters never carry routed traffic, so Envoy's HC
    # interval selection sees them as no-traffic regardless; the agent pins
    # no_traffic_interval == interval on them (cluster.go) — keep that pin.
    stats_config:
      # Default tag extraction stays off; the single custom tag below lifts
      # the cluster name out of cluster.* stat names so the OTel sink exports
      # one metric family per stat with the cluster as an attribute
      # (use_tag_extracted_name + emit_tags_as_attributes on the sink). For
      # health_<pod> probe clusters that attribute IS the pod identity.
      use_all_default_tags: false
      # Envoy tag semantics: the FIRST capture group is removed from the stat
      # name; the tag value is the SECOND group. Groups must include trailing
      # separators or the collapsed name keeps a double dot.
      stats_tags:
        - tag_name: aether.cluster
          regex: "^cluster\\.(([^.]+)\\.)"
        # Per-pod listener stats stay allocated (cx-leak debugging needs
        # downstream_cx_* per pod); this lifts the pod into a tag so exports
        # collapse to listener.{inbound,out_http}.* labeled by aether.pod.
        - tag_name: aether.pod
          regex: "^listener\\.(?:inbound|out_http)(_([^.]+))\\."
        # aether_stats (proposal 012) records via counterFromStatNameWithTags,
        # which inlines the tag VALUES into the full stat name
        # (aether.requests_total.reporter.<v>.source_service.<v>.…). On the
        # filter's own write path those values are real Stats tags — but the
        # node proxy hot-restarts on every config change (talos-main hit epoch
        # 53), and Envoy's StatMerger re-creates each counter across a restart
        # via counterFromStatName() with NO tags
        # ("TODO(snowp): Propagate tag values during hot restarts" in
        # stat_merger.cc). After the first restart the programmatic tags are
        # gone and the values collapse into the metric name with empty labels
        # (the talos-main symptom). These regexes re-derive the six tags from
        # the name exactly the way aether.cluster survives — tag_name MUST match
        # the seven programmatic keys in aether_stats.cc so fresh and merged
        # counters export identical labels. Values are dot-free, so [^.]* is exact.
        # Guarded by //source/extensions/filters/http/aether_stats:tag_extraction_test.
        - tag_name: reporter
          regex: "(\\.reporter\\.([^.]*))"
        - tag_name: source_service
          regex: "(\\.source_service\\.([^.]*))"
        - tag_name: source_pod
          regex: "(\\.source_pod\\.([^.]*))"
        - tag_name: destination_service
          regex: "(\\.destination_service\\.([^.]*))"
        - tag_name: destination_pod
          regex: "(\\.destination_pod\\.([^.]*))"
        - tag_name: response_code
          regex: "(\\.response_code\\.([^.]*))"
        - tag_name: response_flags
          regex: "(\\.response_flags\\.([^.]*))"
      stats_matcher:
        exclusion_list:
          patterns:
            # NOTE: per-pod app_ delivery clusters are no longer excluded —
            # they collapse into one cluster.app.* block via alt_stat_name
            # (agent cluster.go), trading the exclusion for O(1) aggregate
            # visibility of the Envoy->app loopback hop.
            #
            # Certificate expiration gauges: SPIRE owns rotation/expiry.
            - contains: "ssl.certificate."
            # Per-cluster active-HC verbose stats (attempt/success/failure
            # counters); membership_healthy/membership_total are not under
            # this subtree and remain readable. RE2 only — no lookahead.
            # ⚠ StringMatcher.safe_regex is a FULL-STRING match (RE2
            # FullMatch), not a search: every pattern must consume the whole
            # stat name (trailing .*) or it silently excludes NOTHING — this
            # exact pattern shipped without the trailing .* in #146-#155 and
            # never matched.
            - safe_regex:
                regex: "^cluster\\..*\\.health_check\\..*"
            # health_<pod> probe clusters never carry routed traffic, so their
            # upstream_*/lb_*/protocol subtrees are permanently zero (~100
            # dead stats per pod). The membership_* gauges the health_check
            # filter READS (2026-06-11 outage) do not match and remain.
            # Repro-validated against the deployed image: filter answers 200.
            - safe_regex:
                regex: "^cluster\\.health_[^.]*\\.(upstream_|lb_|retry|external|circuit_breakers|http1|http2|max_host_weight|assignment|bind_|original_dst|default_total_match).*"

{{- if .Values.proxy.overload.enabled }}
    # Graceful degradation BEFORE the container memory limit OOM-kills Envoy:
    # shed the cheapest state first (free heap, then idle downstream
    # connections), then stop accepting new work. stop_accepting_requests
    # 503s new streams, which the mesh's client retry policy retries on a
    # DIFFERENT endpoint — an overloaded node sheds load to other replicas.
    # The agent-generated health-gateway listener sets
    # bypass_overload_manager so delegated liveness keeps reporting APP
    # truth (not proxy state) and the registry never flaps on transient
    # overload.
    overload_manager:
      refresh_interval: 0.25s
      resource_monitors:
        # fixed_heap (tcmalloc-internal), NOT cgroup_memory. cgroup_memory
        # reads /sys/fs/cgroup/memory.{current,max}, which works in docker
        # (private cgroup namespace: the container sees its own leaf cgroup)
        # but NOT in this DaemonSet: the proxy is a privileged pod, which
        # gets the HOST cgroup namespace — /sys/fs/cgroup is the host root
        # cgroup, where memory.max does not exist. Envoy then aborts at
        # bootstrap with "No supported cgroup memory implementation found",
        # and the config-watching supervisors hot-restarted every node into
        # the poisoned config simultaneously (cluster-wide data-plane outage,
        # 2026-06-11 ~12:50Z, rev 64). Do not reintroduce cgroup_memory
        # unless the proxy stops being privileged or gains a private
        # cgroupns. Keep maxHeapSizeBytes at ~75% of
        # proxy.resources.limits.memory: the heap excludes the supervisor
        # process, kernel socket buffers and thread stacks, and the top rung
        # must engage below the real OOM line.
        - name: "envoy.resource_monitors.fixed_heap"
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.resource_monitors.fixed_heap.v3.FixedHeapConfig
            max_heap_size_bytes: {{ int64 .Values.proxy.overload.maxHeapSizeBytes }}
      actions:
        - name: "envoy.overload_actions.shrink_heap"
          triggers:
            - name: "envoy.resource_monitors.fixed_heap"
              threshold:
                value: 0.80
        - name: "envoy.overload_actions.disable_http_keepalive"
          triggers:
            - name: "envoy.resource_monitors.fixed_heap"
              threshold:
                value: 0.90
        - name: "envoy.overload_actions.reduce_timeouts"
          typed_config:
            "@type": type.googleapis.com/envoy.config.overload.v3.ScaleTimersOverloadActionConfig
            timer_scale_factors:
              - timer: HTTP_DOWNSTREAM_CONNECTION_IDLE
                min_timeout: 2s
          triggers:
            - name: "envoy.resource_monitors.fixed_heap"
              scaled:
                scaling_threshold: 0.85
                saturation_threshold: 0.95
        - name: "envoy.overload_actions.stop_accepting_requests"
          triggers:
            - name: "envoy.resource_monitors.fixed_heap"
              threshold:
                value: 0.95
        - name: "envoy.overload_actions.stop_accepting_connections"
          triggers:
            - name: "envoy.resource_monitors.fixed_heap"
              threshold:
                value: 0.98
{{- end }}

    dynamic_resources:
      ads_config:
        api_type: DELTA_GRPC
        grpc_services:
          - envoy_grpc:
              cluster_name: agent_xds
      cds_config:
        ads: {}
      lds_config:
        ads: {}

    static_resources:
      clusters:
      - name: agent_xds
        type: STATIC
        load_assignment:
          cluster_name: local_xds
          endpoints:
            - lb_endpoints:
                - endpoint:
                    address:
                      pipe:
                        path: /run/aether/xds.sock
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            explicit_http_config:
              http2_protocol_options:
                connection_keepalive:
                  interval: 15s
                  timeout: 5s
                initial_stream_window_size: 1048576    # 1 MiB
                initial_connection_window_size: 1048576 # 1 MiB
                max_concurrent_streams: 10
{{- if .Values.global.otel.endpoint }}
{{- $otlp := splitList ":" .Values.global.otel.endpoint }}
      - name: otel_collector
        type: STRICT_DNS
        connect_timeout: 2s
        load_assignment:
          cluster_name: otel_collector
          endpoints:
            - lb_endpoints:
                - endpoint:
                    address:
                      socket_address:
                        address: {{ index $otlp 0 }}
                        port_value: {{ index $otlp 1 }}
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            explicit_http_config:
              http2_protocol_options: {}
{{- end }}
{{- end }}
