{{- if .Values.proxy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent.proxy.configMapName" . }}
  namespace: {{ include "agent.namespace" . }}
  labels:
    {{- include "agent.proxy.labels" . | nindent 4 }}
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 9901

    # Required for the HBONE-style tunnel egress: the outbound service clusters
    # route to an internal listener (tunnel_internal) that encapsulates the
    # stream into a CONNECT tunnel. Internal listeners need this bootstrap
    # extension registered, even when the listener itself is delivered via LDS.
    bootstrap_extensions:
      - name: envoy.bootstrap.internal_listener
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.bootstrap.internal_listener.v3.InternalListener

    dynamic_resources:
      ads_config:
        api_type: DELTA_GRPC
        grpc_services:
          - envoy_grpc:
              cluster_name: agent_xds
      cds_config:
        ads: {}
      lds_config:
        ads: {}

    static_resources:
      clusters:
      - name: agent_xds
        type: STATIC
        load_assignment:
          cluster_name: local_xds
          endpoints:
            - lb_endpoints:
                - endpoint:
                    address:
                      pipe:
                        path: /run/aether/xds.sock
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            explicit_http_config:
              http2_protocol_options:
                connection_keepalive:
                  interval: 15s
                  timeout: 5s
                initial_stream_window_size: 1048576    # 1 MiB
                initial_connection_window_size: 1048576 # 1 MiB
                max_concurrent_streams: 10
{{- end }}
