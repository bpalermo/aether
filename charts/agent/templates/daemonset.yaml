apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "agent.fullname" . }}
  namespace: {{ include "agent.namespace" . }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "agent.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "agent.labels" . | nindent 8 }}
    spec:
      hostNetwork: true
      # Resolve in-cluster Service names (e.g. the registrar) while on hostNetwork;
      # plain ClusterFirst is ignored for hostNetwork pods.
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: {{ include "agent.serviceAccountName" . }}
      priorityClassName: system-node-critical
      initContainers:
        - name: cni-install
          image: {{ .Values.cniInstall.image.ref | quote }}
          imagePullPolicy: {{ .Values.cniInstall.image.pullPolicy }}
          args:
            - "--debug={{ .Values.debug }}"
            {{- with .Values.telemetry.otlpEndpoint }}
            # Written into the netconf: the CNI plugin binary runs under the
            # container runtime, so the endpoint cannot reach it via pod env.
            - "--otlp-endpoint={{ . }}"
            {{- end }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsUser: 0
          volumeMounts:
            - name: cni-bin-dir
              mountPath: /host/opt/cni/bin
            - name: cni-conf-dir
              mountPath: /host/etc/cni/net.d
          resources:
            {{- toYaml .Values.cniInstall.resources | nindent 12 }}
      containers:
        - name: agent
          image: {{ .Values.agent.image.ref | quote }}
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          args:
            - "--debug={{ .Values.debug }}"
            - "--proxy-id=$(NODE_NAME)"
            - "--cluster-name={{ .Values.clusterName }}"
            - "--node-name=$(NODE_NAME)"
            - "--mesh-domain={{ .Values.meshDomain }}"
            {{- if .Values.telemetry.enabled }}
            - "--otel-enabled=true"
            {{- end }}
            {{- with .Values.telemetry.otlpEndpoint }}
            - "--otlp-endpoint={{ . }}"
            {{- end }}
            {{- if .Values.telemetry.statsEmitPod }}
            - "--stats-emit-pod"
            {{- end }}
            {{- if .Values.telemetry.accessLogs.enabled }}
            - "--access-logs-enabled"
            - "--access-log-success-sample-rate={{ .Values.telemetry.accessLogs.successSampleRate }}"
            {{- end }}
            {{- if .Values.telemetry.tracing.enabled }}
            - "--tracing-enabled=true"
            - "--trace-sample-rate={{ .Values.telemetry.tracing.sampleRate }}"
            {{- if .Values.telemetry.tracing.export }}
            - "--trace-export=true"
            {{- end }}
            {{- end }}
            {{- if .Values.telemetry.logs.enabled }}
            - "--logs-enabled=true"
            {{- end }}
            - "--spire-enabled={{ .Values.spire.enabled }}"
            {{- if .Values.spire.enabled }}
            - "--spire-workload-socket={{ .Values.spire.workloadSocketPath }}"
            - "--spire-admin-socket={{ .Values.spire.adminSocket.mountPath }}/{{ .Values.spire.adminSocket.socketName }}"
            {{- end }}
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8082
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: GOMEMLIMIT
              valueFrom:
                resourceFieldRef:
                  resource: limits.memory
                  divisor: "1"
            - name: GOMAXPROCS
              valueFrom:
                resourceFieldRef:
                  resource: limits.cpu
                  divisor: "1"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Stamped onto every OTel signal (metrics/traces/logs) via
            # resource.WithFromEnv(), so logs are filterable per node/pod in
            # VictoriaLogs. Refs the env vars defined above ($(VAR) expansion).
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "k8s.node.name=$(NODE_NAME),k8s.pod.name=$(POD_NAME),k8s.namespace.name=$(POD_NAMESPACE)"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "agent.awsSecretName" . }}
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "agent.awsSecretName" . }}
                  key: AWS_SECRET_ACCESS_KEY
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsUser: 0
            capabilities:
              drop:
                - ALL
              add:
                - NET_ADMIN
                {{- if .Values.spire.enabled }}
                # Access the SPIRE agent admin socket (owned by the spire-agent
                # uid) from this root-but-capability-dropped container.
                - DAC_OVERRIDE
                {{- end }}
          volumeMounts:
            - name: run-dir
              mountPath: /run/aether
              mountPropagation: HostToContainer
            - name: cni-netns-dir
              mountPath: /host/var/run/netns
              mountPropagation: HostToContainer
            - name: cni-registry-dir
              mountPath: /host/var/lib/aether/registry
              mountPropagation: HostToContainer
            - name: containerd-sock
              mountPath: /run/containerd/containerd.sock
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- if .Values.spire.enabled }}
            - name: spire-workload-socket
              mountPath: /run/secrets/workload-spiffe-uds
              readOnly: true
            - name: spire-admin-socket
              mountPath: {{ .Values.spire.adminSocket.mountPath }}
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
      volumes:
        - name: run-dir
          hostPath:
            path: /run/aether
            type: DirectoryOrCreate
        - name: cni-bin-dir
          hostPath:
            path: /opt/cni/bin
            type: DirectoryOrCreate
        - name: cni-conf-dir
          hostPath:
            path: /etc/cni/net.d
            type: DirectoryOrCreate
        - name: cni-netns-dir
          hostPath:
            path: /var/run/netns
            type: DirectoryOrCreate
            # DirectoryOrCreate instead of Directory for the following reason - CNI may not bind mount this until a non-hostnetwork pod is scheduled on the node,
            # and we don't want to block CNI agent pod creation on waiting for the first non-hostnetwork pod.
            # Once the CNI does mount this, it will get populated and we're good.
        - name: cni-registry-dir
          hostPath:
            path: /var/lib/aether/registry
            type: DirectoryOrCreate
            # DirectoryOrCreate instead of Directory for the following reason - CNI may not bind mount this until a non-hostnetwork pod is scheduled on the node,
            # and we don't want to block CNI agent pod creation on waiting for the first non-hostnetwork pod.
            # Once the CNI does mount this, it will get populated and we're good.
        - name: containerd-sock
          hostPath:
            path: /run/containerd/containerd.sock
            type: Socket
        - name: tmp
          emptyDir: {}
        {{- if .Values.spire.enabled }}
        - name: spire-workload-socket
          csi:
            driver: csi.spiffe.io
            readOnly: true
        - name: spire-admin-socket
          hostPath:
            path: {{ .Values.spire.adminSocket.hostPath }}
            type: DirectoryOrCreate
        {{- end }}
