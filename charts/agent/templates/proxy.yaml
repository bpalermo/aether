{{- if .Values.proxy.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "agent.proxy.fullname" . }}
  namespace: {{ include "agent.namespace" . }}
  labels:
    {{- include "agent.proxy.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "agent.proxy.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
    {{- if and .Values.proxy.hotRestart.enabled .Values.proxy.hotRestart.crossPod .Values.proxy.hotRestart.surge }}
    # Strategy B: surge a new pod onto the node before tearing down the old one so
    # the new Envoy can hot-restart from the old across the pod boundary.
    #
    # Only safe once every node already runs a coordinating (Strategy B) Envoy: two
    # NON-coordinating epoch-0 Envoys with the same --base-id collide on the
    # hot-restart domain socket in the shared host netns. Bootstrap into B with
    # surge=false (delete-first) first, then enable surge for B→B upgrades.
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    {{- end }}
  template:
    metadata:
      labels:
        {{- include "agent.proxy.labels" . | nindent 8 }}
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: {{ include "agent.proxy.serviceAccountName" . }}
      priorityClassName: system-node-critical
      {{- if and .Values.proxy.hotRestart.enabled .Values.proxy.hotRestart.crossPod }}
      # The deleted (old) pod must keep its Envoy alive as the successor's
      # hot-restart parent until the successor's protocol terminates it — the
      # successor's timers start only after its xDS-gated init, which pod churn
      # can stretch past a minute (e2e 2026-06-11: a 60s grace SIGKILLed the
      # parent mid-protocol on 3/5 nodes when a proxy roll coincided with
      # churn). Give the supervisor generous room to wait; the kubelet's
      # SIGKILL here is the hard stop.
      terminationGracePeriodSeconds: 180
      {{- end }}
      {{- if .Values.proxy.hotRestart.enabled }}
      initContainers:
        # SPIKE (Strategy A): the runtime container is the Envoy image (it carries
        # Envoy and its shared libraries); inject the statically linked supervisor
        # from the agent image by having it self-copy onto a shared volume.
        - name: install-supervisor
          image: {{ .Values.agent.image.ref | quote }}
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          args: ["proxy-supervisor", "--install-path=/opt/aether/supervisor"]
          volumeMounts:
            - name: supervisor-bin
              mountPath: /opt/aether
      {{- end }}
      containers:
        - name: proxy
          # Custom aether-proxy = stock Envoy base + baked aether_stats_filter
          # module (//proxy/filters/telemetry:proxy_image_push). The module's
          # search path is baked into the image, so no volume or env is needed.
          image: {{ .Values.proxy.image.ref | quote }}
          imagePullPolicy: {{ .Values.proxy.image.pullPolicy }}
          {{- if .Values.proxy.hotRestart.enabled }}
          command:
            - "/opt/aether/supervisor"
            - "proxy-supervisor"
            - "--config=/etc/envoy/envoy.yaml"
            - "--envoy-path=/usr/local/bin/envoy"
            - "--watch-config=true"
            - "--base-id={{ .Values.proxy.hotRestart.baseId }}"
            - "--drain-time={{ .Values.proxy.hotRestart.drainTime }}"
            - "--parent-shutdown-time={{ .Values.proxy.hotRestart.parentShutdownTime }}"
            {{- if .Values.proxy.hotRestart.crossPod }}
            - "--state-dir=/run/aether/hotrestart"
            - "--ready-marker=/var/run/aether-proxy/ready"
            - "--admin-address=127.0.0.1:9901"
            - "--handoff-deadline={{ .Values.proxy.hotRestart.handoffDeadline }}"
            - "--admin-unresponsive-deadline={{ .Values.proxy.hotRestart.adminUnresponsiveDeadline }}"
            {{- end }}
            {{- with .Values.telemetry.otlpEndpoint }}
            # Push-first: the supervisor exports its hot-restart lifecycle
            # metrics over OTLP; no scrape port to collide on in the host netns.
            - "--otlp-endpoint={{ . }}"
            {{- end }}
            - "--envoy-arg=-l"
            - "--envoy-arg={{ .Values.proxy.logLevel }}"
            - "--envoy-arg=--service-cluster"
            - "--envoy-arg=aether-proxy"
            - "--envoy-arg=--service-node"
            - "--envoy-arg=$(NODE_NAME)"
            - "--envoy-arg=--service-zone"
            - "--envoy-arg=$(ZONE)"
          {{- else }}
          command:
            - "/usr/local/bin/envoy"
            - "-c"
            - "/etc/envoy/envoy.yaml"
            - "-l"
            - {{ .Values.proxy.logLevel | quote }}
            - "--service-cluster"
            - "aether-proxy"
            - "--service-node"
            - "$(NODE_NAME)"
            - "--service-zone"
            - "$(ZONE)"
          {{- end }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: REGION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['topology.kubernetes.io/region']
            - name: ZONE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.annotations['topology.kubernetes.io/zone']
            - name: ENVOY_UID
              value: "0"
            - name: ENVOY_GID
              value: "0"
          {{- if and .Values.proxy.hotRestart.enabled .Values.proxy.hotRestart.crossPod }}
          # Ready only once this pod's Envoy is live at the newest epoch (post
          # handoff), so the DaemonSet (maxUnavailable=0) keeps the old pod until
          # the new one has taken over. The distroless Envoy image has no shell, so
          # the probe re-execs the supervisor binary.
          readinessProbe:
            exec:
              command:
                - "/opt/aether/supervisor"
                - "proxy-supervisor"
                - "--readiness-check"
                - "--ready-marker=/var/run/aether-proxy/ready"
            initialDelaySeconds: 1
            periodSeconds: 2
            failureThreshold: 3
            successThreshold: 1
          {{- end }}
          {{- with .Values.proxy.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_ADMIN
          volumeMounts:
            - name: proxy-config
              mountPath: /etc/envoy
              readOnly: true
            - name: run-dir
              mountPath: /run/aether
              mountPropagation: HostToContainer
            - name: netns-dir
              mountPath: /var/run/netns
              mountPropagation: HostToContainer
            - name: workload-socket
              mountPath: /run/secrets/workload-spiffe-uds
              readOnly: true
            {{- if .Values.proxy.hotRestart.enabled }}
            - name: supervisor-bin
              mountPath: /opt/aether
              readOnly: true
            - name: dev-shm
              mountPath: /dev/shm
            {{- end }}
            {{- if and .Values.proxy.hotRestart.enabled .Values.proxy.hotRestart.crossPod }}
            - name: ready-marker
              mountPath: /var/run/aether-proxy
            {{- end }}
      volumes:
        {{- if .Values.proxy.hotRestart.enabled }}
        - name: supervisor-bin
          emptyDir: {}
        {{- if .Values.proxy.hotRestart.crossPod }}
        # Strategy B: /dev/shm must be shared across the overlapping pods on the
        # node, so it is a hostPath (tmpfs under /run) rather than a pod-local
        # emptyDir. The hot-restart shared-memory segment lives here.
        - name: dev-shm
          hostPath:
            path: {{ .Values.proxy.hotRestart.shmHostPath | quote }}
            type: DirectoryOrCreate
        # Pod-local readiness marker (not shared across pods).
        - name: ready-marker
          emptyDir: {}
        {{- else }}
        - name: dev-shm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.proxy.hotRestart.shmSizeLimit }}
        {{- end }}
        {{- end }}
        - name: proxy-config
          configMap:
            name: {{ include "agent.proxy.configMapName" . }}
            items:
              - key: envoy.yaml
                path: envoy.yaml
        - name: netns-dir
          hostPath:
            path: /var/run/netns
            type: DirectoryOrCreate
        - name: run-dir
          hostPath:
            path: /run/aether
            type: DirectoryOrCreate
        - name: workload-socket
          csi:
            driver: "csi.spiffe.io"
            readOnly: true
{{- end }}
