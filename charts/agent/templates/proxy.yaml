{{- if .Values.proxy.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "aether-agent.proxy.fullname" . }}
  namespace: {{ include "aether-agent.namespace" . }}
  labels:
    {{- include "aether-agent.proxy.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "aether-agent.proxy.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "aether-agent.proxy.labels" . | nindent 8 }}
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: {{ include "aether-agent.proxy.serviceAccountName" . }}
      priorityClassName: system-node-critical
      containers:
        - name: proxy
          image: "{{ .Values.proxy.image.repository }}@{{ .Values.proxy.image.digest }}"
          command:
            - "/usr/local/bin/envoy"
            - "-c"
            - "/etc/envoy/envoy.yaml"
            - "-l"
            - {{ .Values.proxy.logLevel | quote }}
            - "--service-cluster"
            - "aether-proxy"
            - "--service-node"
            - "$(NODE_NAME)"
            - "--service-zone"
            - "$(ZONE)"
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: REGION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['topology.kubernetes.io/region']
            - name: ZONE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.annotations['topology.kubernetes.io/zone']
            - name: ENVOY_UID
              value: "0"
            - name: ENVOY_GID
              value: "0"
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_ADMIN
          volumeMounts:
            - name: proxy-config
              mountPath: /etc/envoy
              readOnly: true
            - name: run-dir
              mountPath: /run/aether
              mountPropagation: HostToContainer
            - name: netns-dir
              mountPath: /var/run/netns
              mountPropagation: HostToContainer
            - name: workload-socket
              mountPath: /run/secrets/workload-spiffe-uds
              readOnly: true
      volumes:
        - name: proxy-config
          configMap:
            name: {{ include "aether-agent.proxy.configMapName" . }}
            items:
              - key: envoy.yaml
                path: envoy.yaml
        - name: netns-dir
          hostPath:
            path: /var/run/netns
            type: DirectoryOrCreate
        - name: run-dir
          hostPath:
            path: /run/aether
            type: DirectoryOrCreate
        - name: workload-socket
          csi:
            driver: "csi.spiffe.io"
            readOnly: true
{{- end }}
