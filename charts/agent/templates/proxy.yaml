{{- if .Values.proxy.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "agent.proxy.fullname" . }}
  namespace: {{ include "agent.namespace" . }}
  labels:
    {{- include "agent.proxy.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "agent.proxy.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "agent.proxy.labels" . | nindent 8 }}
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: {{ include "agent.proxy.serviceAccountName" . }}
      priorityClassName: system-node-critical
      {{- if .Values.proxy.hotRestart.enabled }}
      initContainers:
        # SPIKE (Strategy A): the runtime container is the Envoy image (it carries
        # Envoy and its shared libraries); inject the statically linked supervisor
        # from the agent image by having it self-copy onto a shared volume.
        - name: install-supervisor
          image: {{ .Values.agent.image.ref | quote }}
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          args: ["proxy-supervisor", "--install-path=/opt/aether/supervisor"]
          volumeMounts:
            - name: supervisor-bin
              mountPath: /opt/aether
      {{- end }}
      containers:
        - name: proxy
          image: "{{ .Values.proxy.image.repository }}@{{ .Values.proxy.image.digest }}"
          {{- if .Values.proxy.hotRestart.enabled }}
          command:
            - "/opt/aether/supervisor"
            - "proxy-supervisor"
            - "--config=/etc/envoy/envoy.yaml"
            - "--envoy-path=/usr/local/bin/envoy"
            - "--watch-config=true"
            - "--base-id={{ .Values.proxy.hotRestart.baseId }}"
            - "--drain-time={{ .Values.proxy.hotRestart.drainTime }}"
            - "--parent-shutdown-time={{ .Values.proxy.hotRestart.parentShutdownTime }}"
            - "--envoy-arg=-l"
            - "--envoy-arg={{ .Values.proxy.logLevel }}"
            - "--envoy-arg=--service-cluster"
            - "--envoy-arg=aether-proxy"
            - "--envoy-arg=--service-node"
            - "--envoy-arg=$(NODE_NAME)"
            - "--envoy-arg=--service-zone"
            - "--envoy-arg=$(ZONE)"
          {{- else }}
          command:
            - "/usr/local/bin/envoy"
            - "-c"
            - "/etc/envoy/envoy.yaml"
            - "-l"
            - {{ .Values.proxy.logLevel | quote }}
            - "--service-cluster"
            - "aether-proxy"
            - "--service-node"
            - "$(NODE_NAME)"
            - "--service-zone"
            - "$(ZONE)"
          {{- end }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: REGION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['topology.kubernetes.io/region']
            - name: ZONE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.annotations['topology.kubernetes.io/zone']
            - name: ENVOY_UID
              value: "0"
            - name: ENVOY_GID
              value: "0"
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_ADMIN
          volumeMounts:
            - name: proxy-config
              mountPath: /etc/envoy
              readOnly: true
            - name: run-dir
              mountPath: /run/aether
              mountPropagation: HostToContainer
            - name: netns-dir
              mountPath: /var/run/netns
              mountPropagation: HostToContainer
            - name: workload-socket
              mountPath: /run/secrets/workload-spiffe-uds
              readOnly: true
            {{- if .Values.proxy.hotRestart.enabled }}
            - name: supervisor-bin
              mountPath: /opt/aether
              readOnly: true
            - name: dev-shm
              mountPath: /dev/shm
            {{- end }}
      volumes:
        {{- if .Values.proxy.hotRestart.enabled }}
        - name: supervisor-bin
          emptyDir: {}
        - name: dev-shm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.proxy.hotRestart.shmSizeLimit }}
        {{- end }}
        - name: proxy-config
          configMap:
            name: {{ include "agent.proxy.configMapName" . }}
            items:
              - key: envoy.yaml
                path: envoy.yaml
        - name: netns-dir
          hostPath:
            path: /var/run/netns
            type: DirectoryOrCreate
        - name: run-dir
          hostPath:
            path: /run/aether
            type: DirectoryOrCreate
        - name: workload-socket
          csi:
            driver: "csi.spiffe.io"
            readOnly: true
{{- end }}
