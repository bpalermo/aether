apiVersion: v1
kind: Service
metadata:
  name: {{ include "controller.webhookServiceName" . }}
  namespace: {{ include "controller.namespace" . }}
  labels:
    {{- include "controller.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "controller.selectorLabels" . | nindent 4 }}
  ports:
    - name: webhook
      port: 443
      targetPort: webhook
      protocol: TCP
