# Default values for the controller chart.

# Override the chart name / fully-qualified resource name.
nameOverride: ""
fullnameOverride: ""

# Namespace the controller resources deploy into. Defaults to the release
# namespace. The agent chart owns the aether namespace by default, so creation is
# off here; enable it for a standalone controller install.
namespace:
  create: false
  name: ""

# Aether system config — set ONCE for the whole system and inherited by every
# component. Via the `aether` umbrella chart these come from the umbrella's
# top-level `global:` block; the defaults below apply only to a standalone
# controller install.
global:
  otel:
    enabled: false
    endpoint: ""
    logs: false
    traceSampleRate: 0.1
    traceExport: false
  spire:
    # Enables SPIRE mTLS across the system; here it also switches the webhook
    # serving cert to a SPIRE SVID (see the `spire` block below).
    enabled: true

# Enable verbose logging (`--debug`).
debug: true

# Leader election is always on in the binary; a single replica is enough, extra
# replicas are warm standbys.
replicaCount: 1

image:
  # Substituted at package time with the digest-pinned reference produced by the
  # in-repo `//controller/cmd/controller:image_push` target.
  ref: "{@//controller/cmd/controller:image_push}"
  pullPolicy: Always

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 64Mi

# Webhook serving certificate. Driven by the system-wide global.spire.enabled:
#   true  -> serve the webhook with a SPIRE X.509 SVID over the csi.spiffe.io
#     Workload API socket, and let the controller inject the SPIRE trust bundle
#     into the webhook caBundle (auto-rotating, no cert files). The SPIRE
#     registration entry for the controller MUST list the webhook Service DNS name
#     (<release>-controller-webhook.<namespace>.svc) in its dnsNames, or the
#     apiserver's TLS hostname check fails.
#   false -> a Helm-generated self-signed cert (genSignedCert), reused across
#     upgrades via lookup; caBundle baked into the webhook config.
spire:
  # SPIRE Workload API socket path (the csi.spiffe.io mount + socket filename).
  workloadSocketPath: /run/secrets/workload-spiffe-uds/socket

# Proxy MeshConfig. The controller seeds and projects the singleton MeshConfig CR
# into a ConfigMap the agent mounts. The CR only OVERRIDES the proxy data plane's
# observability; everything else is inherited from the aether system config (the
# global block above). See docs/proposals/015_mesh-config.md.
meshConfig:
  # The projected ConfigMap name is derived from the release name (see the
  # controller.meshConfigMapName helper), matching what the agent mounts — there
  # is no name value to keep in sync.

  # Seed the singleton MeshConfig CR (name "default") on first install only. The
  # CR is created once and NEVER overwritten on upgrade (lookup-skip + Helm
  # resource-policy: keep), so operators own it via kubectl thereafter and new
  # chart versions never reset it. Set false to manage the CR entirely yourself.
  createDefault: true

  # The MeshConfig spec seeded into the default CR — proxy observability overrides
  # only. Keys are the protojson field names of aether.config.v1.MeshConfig.proxy;
  # the webhook protovalidate's this. Used only at first-install seeding. An empty
  # block ({}) means the proxy inherits everything from the aether system config.
  proxy: {}
    # accessLogsEnabled: false
    # accessLogSuccessSampleRate: 100
    # tracingEnabled: false
    # traceSampleRate: 0.01
    # emitStatsPod: false
