apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aether.registrar.fullname" . }}
  namespace: {{ include "aether.namespace" . }}
  labels:
    {{- include "aether.registrar.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.registrar.replicaCount }}
  selector:
    matchLabels:
      {{- include "aether.registrar.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aether.registrar.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "aether.registrar.serviceAccountName" . }}
      # Tolerate the aether startup taint: the registrar is an aether-system
      # control-plane pod, not a mesh workload. The CNI plugin skips aether-system
      # pods (they never touch the agent), so it has no node-readiness dependency
      # and must not wait for the agent to untaint a node (#261).
      tolerations:
        - key: aether.io/agent-not-ready
          operator: Exists
          effect: NoSchedule
      containers:
        - name: registrar
          image: {{ include "aether.image" .Values.registrar.image | quote }}
          imagePullPolicy: {{ .Values.registrar.image.pullPolicy }}
          args:
            - "--debug={{ .Values.debug }}"
            - "--cluster-name={{ .Values.clusterName }}"
            # Aether system config, inherited from the umbrella global block.
            {{- if .Values.otel.enabled }}
            - "--otel-enabled=true"
            {{- end }}
            {{- with .Values.otel.endpoint }}
            - "--otlp-endpoint={{ . }}"
            {{- end }}
            {{- if .Values.otel.logs }}
            - "--logs-enabled=true"
            {{- end }}
            - "--trace-sample-rate={{ .Values.otel.traceSampleRate }}"
            {{- if .Values.otel.traceExport }}
            - "--trace-export=true"
            {{- end }}
            - "--registry-backend={{ .Values.registrar.registryBackend }}"
            {{- if eq .Values.registrar.registryBackend "etcd" }}
            - "--etcd-endpoints={{ join "," .Values.registrar.etcd.endpoints }}"
            - "--region={{ .Values.registrar.region }}"
            {{- range .Values.registrar.peerEtcd }}
            - "--peer-etcd={{ . }}"
            {{- end }}
            {{- end }}
            - "--grpc-address=:{{ .Values.registrar.service.targetPort }}"
            {{- if .Values.registrar.enableMCS }}
            - "--enable-mcs"
            {{- end }}
            {{- if .Values.controlCluster }}
            - "--control-cluster={{ .Values.controlCluster }}"
            {{- end }}
            - "--spire-enabled={{ .Values.spire.enabled }}"
            {{- if .Values.spire.enabled }}
            - "--spire-workload-socket={{ .Values.spire.workloadSocketPath }}"
            {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.registrar.service.targetPort }}
              protocol: TCP
            - name: metrics
              containerPort: 8081
              protocol: TCP
            - name: health
              containerPort: 8082
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            {{- with .Values.registrar.aws.region }}
            # AWS_REGION is a plain env (no static keys). For the dynamodb backend,
            # IRSA supplies credentials via the registrar SA's role-arn annotation
            # (registrar.aws.roleArn) — the pod-identity webhook injects the rest.
            - name: AWS_REGION
              value: {{ . | quote }}
            {{- end }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Stamped onto every OTel signal (metrics/traces/logs) via
            # resource.WithFromEnv(), so logs are filterable per pod in
            # VictoriaLogs. Refs the env vars defined above ($(VAR) expansion).
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "k8s.pod.name=$(POD_NAME),k8s.namespace.name=$(POD_NAMESPACE)"
            - name: GOMEMLIMIT
              valueFrom:
                resourceFieldRef:
                  resource: limits.memory
                  divisor: "1"
            - name: GOMAXPROCS
              valueFrom:
                resourceFieldRef:
                  resource: limits.cpu
                  divisor: "1"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
          {{- if .Values.spire.enabled }}
          volumeMounts:
            - name: workload-socket
              mountPath: /run/secrets/workload-spiffe-uds
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.registrar.resources | nindent 12 }}
      {{- if .Values.spire.enabled }}
      volumes:
        - name: workload-socket
          csi:
            driver: "csi.spiffe.io"
            readOnly: true
      {{- end }}
