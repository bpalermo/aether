{{- if .Values.agent.awsCredentials.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aether.agent.awsSecretName" . }}
  namespace: {{ include "aether.namespace" . }}
  labels:
    {{- include "aether.agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: {{ required "awsCredentials.accessKeyId is required when awsCredentials.create is true" .Values.agent.awsCredentials.accessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ required "awsCredentials.secretAccessKey is required when awsCredentials.create is true" .Values.agent.awsCredentials.secretAccessKey | quote }}
{{- end }}
