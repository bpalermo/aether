apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "aether.agent.clusterScopedName" . }}
  labels:
    {{- include "aether.agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "get", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    # patch: remove the aether.io/agent-not-ready startup taint once CNI is serving.
    verbs: ["list", "get", "watch", "patch"]
  {{- if .Values.agent.gamma }}
  # GAMMA east-west (proposal 018): watch HTTP/GRPCRoutes parented to Services cluster-wide.
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes", "grpcroutes"]
    verbs: ["list", "get", "watch"]
  {{- end }}
  {{- if or .Values.agent.transparentCapture .Values.agent.meshDns }}
  # Transparent capture (Phase 3a) / mesh DNS (mesh-global FQDN): watch the generated
  # mesh Services for their cluster.local authorities + ClusterIPs.
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["list", "get", "watch"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "aether.agent.clusterScopedName" . }}
  labels:
    {{- include "aether.agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "aether.agent.clusterScopedName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "aether.agent.serviceAccountName" . }}
    namespace: {{ include "aether.namespace" . }}
