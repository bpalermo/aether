apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "aether.agent.clusterScopedName" . }}
  labels:
    {{- include "aether.agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "get", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    # patch: remove the aether.io/agent-not-ready startup taint once CNI is serving.
    verbs: ["list", "get", "watch", "patch"]
  {{- if .Values.agent.gamma }}
  # GAMMA east-west (proposal 018): watch HTTP/GRPCRoutes parented to Services cluster-wide.
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes", "grpcroutes"]
    verbs: ["list", "get", "watch"]
  # Write Gateway API status (Accepted/ResolvedRefs RouteParentStatus, mesh controller).
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes/status", "grpcroutes/status"]
    verbs: ["get", "update", "patch"]
  # HTTPFilter (proposal 025): the escape-hatch CRD a route ExtensionRef points at;
  # the GAMMA reconciler lists/watches it to attach the filter to the route.
  - apiGroups: ["config.aether.io"]
    resources: ["httpfilters"]
    verbs: ["list", "get", "watch"]
  {{- end }}
  {{- if .Values.agent.l4Routes }}
  # L4 route types (proposal 018, Phase 3b): watch TCPRoutes/TLSRoutes/UDPRoutes
  # parented to Services cluster-wide.
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["tcproutes", "tlsroutes", "udproutes"]
    verbs: ["list", "get", "watch"]
  # Write Gateway API status (Accepted/ResolvedRefs RouteParentStatus, mesh controller).
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["tcproutes/status", "tlsroutes/status", "udproutes/status"]
    verbs: ["get", "update", "patch"]
  {{- end }}
  {{- if or .Values.agent.gamma .Values.agent.l4Routes }}
  # ReferenceGrant (v1beta1): admit cross-namespace backendRefs on GAMMA/L4 routes.
  # Read-only; a grant's presence gates whether a cross-ns backend is served +
  # surfaced as ResolvedRefs (RefNotPermitted otherwise). Cluster-wide.
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["referencegrants"]
    verbs: ["list", "get", "watch"]
  {{- end }}
  {{- if or .Values.agent.transparentCapture .Values.agent.meshDns .Values.agent.gamma .Values.agent.l4Routes }}
  # Transparent capture (Phase 3a) / mesh DNS (mesh-global FQDN): watch the generated
  # mesh Services for their cluster.local authorities + ClusterIPs. GAMMA + l4route also
  # read Services to resolve backendRefs for the ResolvedRefs status condition.
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["list", "get", "watch"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "aether.agent.clusterScopedName" . }}
  labels:
    {{- include "aether.agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "aether.agent.clusterScopedName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "aether.agent.serviceAccountName" . }}
    namespace: {{ include "aether.namespace" . }}
