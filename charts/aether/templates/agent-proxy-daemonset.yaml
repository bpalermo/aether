{{- if .Values.proxy.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "aether.proxy.fullname" . }}
  namespace: {{ include "aether.namespace" . }}
  labels:
    {{- include "aether.proxy.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "aether.proxy.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
    # Surge a new pod onto the node before tearing down the old one so the new
    # Envoy can hot-restart from the old across the pod boundary. maxUnavailable:0
    # counts only Ready pods, and the successor holds readiness until the handoff
    # completes (see the readiness probe below), so the predecessor stays until the
    # new Envoy has taken over.
    #
    # NOTE for a brand-new cluster or a migration from a non-supervised proxy: the
    # very first rollout onto a node with an existing NON-coordinating epoch-0
    # Envoy would collide on the --base-id hot-restart domain socket in the shared
    # host netns. Fresh nodes (no prior proxy) are unaffected. There is no longer a
    # delete-first toggle; bootstrap such a migration by deleting the old proxy
    # pods first.
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "aether.proxy.labels" . | nindent 8 }}
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: {{ include "aether.proxy.serviceAccountName" . }}
      priorityClassName: system-node-critical
      tolerations:
        # The proxy runs on every node and must tolerate the aether startup taint
        # (the agent removes it once CNI is serving). Workload pods do NOT — they
        # wait for a ready node (#261).
        - key: aether.io/agent-not-ready
          operator: Exists
          effect: NoSchedule
      # The deleted (old) pod must keep its Envoy alive as the successor's
      # hot-restart parent until the successor's protocol terminates it — the
      # successor's timers start only after its xDS-gated init, which pod churn
      # can stretch past a minute (e2e 2026-06-11: a 60s grace SIGKILLed the
      # parent mid-protocol on 3/5 nodes when a proxy roll coincided with
      # churn). Give the supervisor generous room to wait; the kubelet's
      # SIGKILL here is the hard stop.
      terminationGracePeriodSeconds: 180
      initContainers:
        # The runtime container is the Envoy image (it carries Envoy and its
        # shared libraries); inject the statically linked supervisor from the
        # agent image by having it self-copy onto a shared volume.
        - name: install-supervisor
          image: {{ include "aether.image" .Values.agent.image | quote }}
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          args: ["proxy-supervisor", "--install-path=/opt/aether/supervisor"]
          volumeMounts:
            - name: supervisor-bin
              mountPath: /opt/aether
      containers:
        - name: proxy
          # Custom aether-proxy = Envoy with the compiled-in aether_stats C++
          # extension (//proxy:image_push, proposal 012). The extension is part
          # of the binary, so no module volume or search-path env is needed.
          image: {{ include "aether.image" .Values.proxy.image | quote }}
          imagePullPolicy: {{ .Values.proxy.image.pullPolicy }}
          command:
            - "/opt/aether/supervisor"
            - "proxy-supervisor"
            - "--config=/etc/envoy/envoy.yaml"
            - "--envoy-path=/usr/local/bin/envoy"
            - "--watch-config=true"
            - "--base-id={{ .Values.proxy.hotRestart.baseId }}"
            - "--drain-time={{ .Values.proxy.hotRestart.drainTime }}"
            - "--parent-shutdown-time={{ .Values.proxy.hotRestart.parentShutdownTime }}"
            - "--state-dir=/run/aether/hotrestart"
            - "--ready-marker=/var/run/aether-proxy/ready"
            - "--admin-address=127.0.0.1:9901"
            - "--handoff-deadline={{ .Values.proxy.hotRestart.handoffDeadline }}"
            - "--admin-unresponsive-deadline={{ .Values.proxy.hotRestart.adminUnresponsiveDeadline }}"
            {{- with .Values.otel.endpoint }}
            # Push-first: the supervisor exports its hot-restart lifecycle
            # metrics over OTLP; no scrape port to collide on in the host netns.
            - "--otlp-endpoint={{ . }}"
            {{- end }}
            - "--envoy-arg=-l"
            - "--envoy-arg={{ .Values.proxy.logLevel }}"
            - "--envoy-arg=--service-cluster"
            - "--envoy-arg=aether-proxy"
            - "--envoy-arg=--service-node"
            - "--envoy-arg=$(NODE_NAME)"
            - "--envoy-arg=--service-zone"
            - "--envoy-arg=$(ZONE)"
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: POD_UID
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.uid
            # Per-node/pod identity for the OTLP stats Resource, using OTel k8s.*
            # semantic-convention attribute names. The environment resource
            # detector (configmap.yaml stats_sinks) parses OTEL_RESOURCE_ATTRIBUTES
            # into the Resource; the collector promotes k8s.node.name -> a `node`
            # label ONLY on the static infra clusters (agent_xds, otel_collector),
            # whose one-series-per-node counters otherwise collide into a single
            # identityless series and make rate()/increase() fabricate resets and
            # connect-failures. Mesh clusters carry the resource attrs but are not
            # promoted, so they stay collapsed (cardinality bounded at the node
            # target). k8s.node.name (not k8s.pod.name) is promoted: it is stable
            # across proxy hot-restarts, so the per-node counter series — and its
            # rate() — survive restarts cleanly. (k8s.deployment.name and
            # k8s.pod.start_time are omitted: N/A for a DaemonSet pod / not
            # available via the downward API.) $(VAR) expands from the env above.
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "k8s.node.name=$(NODE_NAME),k8s.namespace.name=$(POD_NAMESPACE),k8s.pod.name=$(POD_NAME),k8s.pod.uid=$(POD_UID)"
            - name: REGION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['topology.kubernetes.io/region']
            - name: ZONE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.annotations['topology.kubernetes.io/zone']
            - name: ENVOY_UID
              value: "0"
            - name: ENVOY_GID
              value: "0"
          # Ready only once this pod's Envoy is live at the newest epoch (post
          # handoff), so the DaemonSet (maxUnavailable=0) keeps the old pod until
          # the new one has taken over. The distroless Envoy image has no shell, so
          # the probe re-execs the supervisor binary.
          readinessProbe:
            exec:
              command:
                - "/opt/aether/supervisor"
                - "proxy-supervisor"
                - "--readiness-check"
                - "--ready-marker=/var/run/aether-proxy/ready"
            initialDelaySeconds: 1
            periodSeconds: 2
            failureThreshold: 3
            successThreshold: 1
          {{- with .Values.proxy.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_ADMIN
          volumeMounts:
            - name: proxy-config
              mountPath: /etc/envoy
              readOnly: true
            - name: run-dir
              mountPath: /run/aether
              mountPropagation: HostToContainer
            - name: netns-dir
              mountPath: /var/run/netns
              mountPropagation: HostToContainer
            {{- if .Values.spire.enabled }}
            # The SPIRE workload UDS is mounted from the csi.spiffe.io CSI driver,
            # which only exists when SPIRE is deployed. With spire.enabled=false the
            # mesh runs cleartext (no SDS), so mounting it would wedge the proxy pod
            # in FailedMount ("driver name csi.spiffe.io not found"). Gate it exactly
            # like the agent DaemonSet does.
            - name: workload-socket
              mountPath: /run/secrets/workload-spiffe-uds
              readOnly: true
            {{- end }}
            - name: supervisor-bin
              mountPath: /opt/aether
              readOnly: true
            - name: dev-shm
              mountPath: /dev/shm
            - name: ready-marker
              mountPath: /var/run/aether-proxy
            {{- if .Values.proxy.authzSidecar.enabled }}
            - name: authz-socket
              mountPath: /run/aether/authz
            {{- end }}
        {{- if .Values.proxy.authzSidecar.enabled }}
        # External authorization sidecar (proposal 027): serves
        # envoy.service.auth.v3.Authorization on the shared Unix socket. The proxy's
        # bootstrap carries a static `authz_sidecar` cluster pointing at it.
        - name: authz
          {{- if .Values.proxy.authzSidecar.opa.enabled }}
          image: {{ .Values.proxy.authzSidecar.opa.image | quote }}
          args:
            - "run"
            - "--server"
            - "--disable-telemetry"
            - "--addr=127.0.0.1:8181"
            - "--set=plugins.envoy_ext_authz_grpc.addr=unix:///run/aether/authz/authz.sock"
            - "--set=decision_logs.console=true"
            - "/policy/policy.rego"
          volumeMounts:
            - name: authz-socket
              mountPath: /run/aether/authz
            - name: opa-policy
              mountPath: /policy
              readOnly: true
          {{- else }}
          image: "{{ .Values.proxy.authzSidecar.image.repository }}:{{ .Values.proxy.authzSidecar.image.tag }}"
          {{- with .Values.proxy.authzSidecar.image.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: authz-socket
              mountPath: /run/aether/authz
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
        {{- end }}
      volumes:
        - name: supervisor-bin
          emptyDir: {}
        # /dev/shm must be shared across the overlapping pods on the node, so it is
        # a hostPath (tmpfs under /run) rather than a pod-local emptyDir. The
        # hot-restart shared-memory segment lives here.
        - name: dev-shm
          hostPath:
            path: {{ .Values.proxy.hotRestart.shmHostPath | quote }}
            type: DirectoryOrCreate
        # Pod-local readiness marker (not shared across pods).
        - name: ready-marker
          emptyDir: {}
        {{- if .Values.proxy.authzSidecar.enabled }}
        - name: authz-socket
          emptyDir: {}
        {{- if .Values.proxy.authzSidecar.opa.enabled }}
        - name: opa-policy
          configMap:
            name: {{ include "aether.fullname" . }}-opa-policy
        {{- end }}
        {{- end }}
        - name: proxy-config
          configMap:
            name: {{ include "aether.proxy.configMapName" . }}
            items:
              - key: envoy.yaml
                path: envoy.yaml
        - name: netns-dir
          hostPath:
            path: /var/run/netns
            type: DirectoryOrCreate
        - name: run-dir
          hostPath:
            path: /run/aether
            type: DirectoryOrCreate
        {{- if .Values.spire.enabled }}
        - name: workload-socket
          csi:
            driver: "csi.spiffe.io"
            readOnly: true
        {{- end }}
{{- end }}
