apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "aether.registrar.clusterScopedName" . }}
  labels:
    {{- include "aether.registrar.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "get", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list", "get", "watch"]
  {{- if .Values.registrar.generateMeshServices }}
  # Transparent-capture VIPs (proposal 018, Phase 3a): the leader registrar
  # creates/prunes selectorless mesh Services across namespaces.
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["list", "get", "watch", "create", "update", "patch", "delete"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "aether.registrar.clusterScopedName" . }}
  labels:
    {{- include "aether.registrar.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "aether.registrar.clusterScopedName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "aether.registrar.serviceAccountName" . }}
    namespace: {{ include "aether.namespace" . }}
