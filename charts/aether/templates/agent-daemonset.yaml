apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "aether.agent.fullname" . }}
  namespace: {{ include "aether.namespace" . }}
  labels:
    {{- include "aether.agent.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "aether.agent.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "aether.agent.labels" . | nindent 8 }}
    spec:
      hostNetwork: true
      # Resolve in-cluster Service names (e.g. the registrar) while on hostNetwork;
      # plain ClusterFirst is ignored for hostNetwork pods.
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: {{ include "aether.agent.serviceAccountName" . }}
      priorityClassName: system-node-critical
      tolerations:
        # Tolerate the aether startup taint so the agent — which REMOVES it once
        # its CNI is serving — runs on a not-yet-ready node. Workload pods do NOT
        # tolerate it, so they wait until the agent untaints the node (#261). The
        # operator registers the taint via the kubelet (--register-with-taints).
        - key: aether.io/agent-not-ready
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: cni-install
          image: {{ include "aether.image" .Values.cniInstall.image | quote }}
          imagePullPolicy: {{ .Values.cniInstall.image.pullPolicy }}
          args:
            - "--debug={{ .Values.debug }}"
            {{- with .Values.otel.endpoint }}
            # Written into the netconf: the CNI plugin binary runs under the
            # container runtime, so the endpoint cannot reach it via pod env.
            # This is the Envoy/CNI plumbing endpoint (template-time), distinct
            # from the agent's runtime OTLP in the MeshConfig CR.
            - "--otlp-endpoint={{ . }}"
            {{- end }}
            {{- if .Values.agent.transparentCapture }}
            - "--transparent-capture"
            {{- end }}
            {{- if .Values.agent.meshDns }}
            - "--mesh-dns"
            - "--host-ip=$(HOST_IP)"
            {{- end }}
          {{- if .Values.agent.meshDns }}
          env:
            # The node IP written into the netconf as the mesh-DNS DNAT target.
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          {{- end }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsUser: 0
          volumeMounts:
            - name: cni-bin-dir
              mountPath: /host/opt/cni/bin
            - name: cni-conf-dir
              mountPath: /host/etc/cni/net.d
          resources:
            {{- toYaml .Values.cniInstall.resources | nindent 12 }}
      containers:
        - name: agent
          image: {{ include "aether.image" .Values.agent.image | quote }}
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          args:
            - "--debug={{ .Values.debug }}"
            - "--proxy-id=$(NODE_NAME)"
            - "--cluster-name={{ .Values.clusterName }}"
            - "--node-name=$(NODE_NAME)"
            {{- if .Values.agent.gamma }}
            - "--gamma"
            {{- end }}
            {{- if .Values.agent.l4Routes }}
            - "--l4-routes"
            {{- end }}
            {{- if .Values.agent.transparentCapture }}
            - "--transparent-capture"
            {{- end }}
            {{- if .Values.agent.meshDns }}
            - "--mesh-dns"
            {{- range .Values.agent.meshDnsUpstream }}
            - "--mesh-dns-upstream={{ . }}"
            {{- end }}
            {{- end }}
            # Aether system config, inherited from the umbrella global block.
            - "--mesh-domain={{ .Values.meshDomain }}"
            {{- if .Values.otel.enabled }}
            - "--otel-enabled=true"
            {{- end }}
            {{- with .Values.otel.endpoint }}
            - "--otlp-endpoint={{ . }}"
            {{- end }}
            {{- if .Values.otel.logs }}
            - "--logs-enabled=true"
            {{- end }}
            - "--trace-sample-rate={{ .Values.otel.traceSampleRate }}"
            {{- if .Values.otel.traceExport }}
            - "--trace-export=true"
            {{- end }}
            - "--spire-enabled={{ .Values.spire.enabled }}"
            # Proxy access-log / tracing / metrics overrides come from the mounted
            # MeshConfig ConfigMap (projected from the MeshConfig CR), defaulting to
            # the system config above.
            {{- if .Values.spire.enabled }}
            - "--spire-workload-socket={{ .Values.spire.workloadSocketPath }}"
            - "--spire-admin-socket={{ .Values.spire.adminSocket.mountPath }}/{{ .Values.spire.adminSocket.socketName }}"
            {{- end }}
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8082
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: GOMEMLIMIT
              valueFrom:
                resourceFieldRef:
                  resource: limits.memory
                  divisor: "1"
            - name: GOMAXPROCS
              valueFrom:
                resourceFieldRef:
                  resource: limits.cpu
                  divisor: "1"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.agent.meshDns }}
            # The node IP the in-process mesh-DNS resolver binds + the per-pod Envoy
            # DNS listeners' mesh_dns cluster targets (proposal 018, mesh-global FQDN).
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            {{- end }}
            # Stamped onto every OTel signal (metrics/traces/logs) via
            # resource.WithFromEnv(), so logs are filterable per node/pod in
            # VictoriaLogs. Refs the env vars defined above ($(VAR) expansion).
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "k8s.node.name=$(NODE_NAME),k8s.pod.name=$(POD_NAME),k8s.namespace.name=$(POD_NAMESPACE)"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsUser: 0
            capabilities:
              drop:
                - ALL
              add:
                - NET_ADMIN
                {{- if .Values.spire.enabled }}
                # Access the SPIRE agent admin socket (owned by the spire-agent
                # uid) from this root-but-capability-dropped container.
                - DAC_OVERRIDE
                {{- end }}
          volumeMounts:
            - name: run-dir
              mountPath: /run/aether
              mountPropagation: HostToContainer
            - name: cni-netns-dir
              mountPath: /host/var/run/netns
              mountPropagation: HostToContainer
            - name: cni-registry-dir
              mountPath: /host/var/lib/aether/registry
              mountPropagation: HostToContainer
            - name: containerd-sock
              mountPath: /run/containerd/containerd.sock
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: mesh-config
              mountPath: /etc/aether
              readOnly: true
            {{- if .Values.spire.enabled }}
            - name: spire-workload-socket
              mountPath: /run/secrets/workload-spiffe-uds
              readOnly: true
            - name: spire-admin-socket
              mountPath: {{ .Values.spire.adminSocket.mountPath }}
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
      volumes:
        - name: run-dir
          hostPath:
            path: /run/aether
            type: DirectoryOrCreate
        - name: cni-bin-dir
          hostPath:
            path: /opt/cni/bin
            type: DirectoryOrCreate
        - name: cni-conf-dir
          hostPath:
            path: /etc/cni/net.d
            type: DirectoryOrCreate
        - name: cni-netns-dir
          hostPath:
            path: /var/run/netns
            type: DirectoryOrCreate
            # DirectoryOrCreate instead of Directory for the following reason - CNI may not bind mount this until a non-hostnetwork pod is scheduled on the node,
            # and we don't want to block CNI agent pod creation on waiting for the first non-hostnetwork pod.
            # Once the CNI does mount this, it will get populated and we're good.
        - name: cni-registry-dir
          hostPath:
            path: /var/lib/aether/registry
            type: DirectoryOrCreate
            # DirectoryOrCreate instead of Directory for the following reason - CNI may not bind mount this until a non-hostnetwork pod is scheduled on the node,
            # and we don't want to block CNI agent pod creation on waiting for the first non-hostnetwork pod.
            # Once the CNI does mount this, it will get populated and we're good.
        - name: containerd-sock
          hostPath:
            path: /run/containerd/containerd.sock
            type: Socket
        - name: tmp
          emptyDir: {}
        - name: mesh-config
          # Projected from the MeshConfig CR by the aether-controller. The name is
          # derived from the release (no chart value); the pod stays in
          # ContainerCreating until it exists. See proposal 015.
          configMap:
            name: {{ include "aether.meshConfigMapName" . }}
        {{- if .Values.spire.enabled }}
        - name: spire-workload-socket
          csi:
            driver: csi.spiffe.io
            readOnly: true
        - name: spire-admin-socket
          hostPath:
            path: {{ .Values.spire.adminSocket.hostPath }}
            type: DirectoryOrCreate
        {{- end }}
