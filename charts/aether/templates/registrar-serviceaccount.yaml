apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "aether.registrar.serviceAccountName" . }}
  namespace: {{ include "aether.namespace" . }}
  labels:
    {{- include "aether.registrar.labels" . | nindent 4 }}
  {{- with .Values.registrar.aws.roleArn }}
  annotations:
    # IRSA web-identity: the pod-identity webhook injects AWS_ROLE_ARN + a
    # projected SA token so the registrar assumes this role (used only by the
    # dynamodb registry backend; no static keys). See issue #257.
    eks.amazonaws.com/role-arn: {{ . | quote }}
  {{- end }}
