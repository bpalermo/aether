# Aether umbrella values.
#
# `global` is the single source of truth for system-wide config: every subchart
# (controller, registrar, agent) inherits it. Enable OTEL or SPIRE here once and
# the whole system picks it up. Per-subchart settings live under the subchart's
# name (agent:, registrar:, controller:). The proxy data plane can override its
# own access-log / tracing / metrics policy via the MeshConfig CR — see
# controller.meshConfig — defaulting to the global config below.
global:
  # DNS-style domain mesh authorities live under (<service>.<meshDomain>).
  meshDomain: aether.internal
  otel:
    # Enable the OTel MeterProvider + push telemetry to the collector everywhere.
    enabled: false
    # OTLP gRPC collector endpoint (host:port), e.g.
    # "otel-collector.observability.svc:4317". Empty disables OTLP export.
    endpoint: ""
    # Export component application logs over OTLP (tee'd into stderr).
    logs: false
    # Head-sampling ratio for traces (0.0-1.0); bounds exported spans only.
    traceSampleRate: 0.1
    # Export spans over OTLP (needs a collector traces pipeline).
    traceExport: false
  spire:
    # Enable SPIRE mTLS across the whole system (agent, registrar, controller
    # webhook serving cert).
    enabled: true

# Per-subchart overrides go under the subchart name, e.g.:
# agent:
#   clusterName: talos-main
# registrar:
#   replicaCount: 2
# controller:
#   meshConfig:
#     proxy:
#       tracingEnabled: true
