# Default values for the aether chart.
#
# Aether is one system: the agent (DaemonSet), the per-node Envoy proxy, the
# in-cluster registrar, and the mesh-config controller deploy together from this
# single chart. System config (OTEL, SPIRE, mesh domain) is set ONCE at the top
# level and referenced by every component — no umbrella/globals indirection. The
# proxy data plane is the only thing whose observability can be retuned at runtime
# (via the MeshConfig CR); everything else is deterministic deploy-time config.
# See docs/proposals/015_mesh-config.md.
#
# Startup taint (cold-start CNI gate, issue #261): this chart ships the
# aether.io/agent-not-ready toleration (agent + proxy DaemonSets only), the
# nodes/patch RBAC, and the agent-side taint removal (it drops the taint once its
# CNI socket is serving). You MUST register nodes WITH the taint yourself so
# workload pods wait for a ready agent — the chart cannot taint nodes. Examples:
#   kubelet:  --register-with-taints=aether.io/agent-not-ready=true:NoSchedule
#   Talos:    machine.kubelet.extraArgs."register-with-taints" (machineconfig)
# The agent's --remove-startup-taint flag (default true) governs the removal.

# Override the chart name / fully-qualified resource name.
nameOverride: ""
fullnameOverride: ""

# Namespace all aether resources deploy into. Defaults to the release namespace.
# Rendered with privileged pod-security labels (required by the agent's
# hostNetwork + NET_ADMIN privileges) when create is true.
namespace:
  create: true
  name: ""

# Cluster name passed to the agent and registrar (`--cluster-name`).
clusterName: talos-main

# Enable verbose logging on all components (`--debug`).
debug: true

# DNS-style domain mesh authorities live under (<service>.<meshDomain>): clients
# address services as <service>.<meshDomain>; also the ODCDS catch-all suffix.
meshDomain: aether.internal

# System-wide OTEL config — enable once, every component inherits it. The proxy
# data plane may OVERRIDE its own access-log / tracing / metrics policy via the
# MeshConfig CR (see meshConfig below), defaulting to this.
otel:
  # Enable the OTel MeterProvider + push telemetry to the collector everywhere.
  enabled: false
  # OTLP gRPC collector endpoint (host:port, insecure), e.g.
  # "otel-collector.observability.svc:4317". Empty disables OTLP export and the
  # proxy/CNI stat sink. NOTE: this is a deterministic, deploy-time value — the
  # CNI plugin and Envoy bootstrap bake it in; it is never read from a runtime
  # ConfigMap, so the fleet rolls atomically and a config change can't break CNI.
  endpoint: ""
  # Export component application logs over OTLP (tee'd into stderr).
  logs: false
  # Head-sampling ratio for traces (0.0-1.0); bounds exported spans only.
  traceSampleRate: 0.1
  # Export spans over OTLP (needs a collector traces pipeline).
  traceExport: false

# System-wide SPIRE config. `enabled` is the mesh-wide mTLS switch (agent,
# registrar, and the controller webhook serving cert); the socket paths / trust
# domain / admin socket are per-component plumbing.
spire:
  enabled: true
  # Workload API socket path (the csi.spiffe.io mount + socket filename), shared
  # by agent, registrar and controller.
  workloadSocketPath: /run/secrets/workload-spiffe-uds/socket
  # SPIFFE trust domain authorized for the registrar's mTLS peers. Empty = ROOTCA.
  trustDomain: ""
  # SPIRE agent admin socket (Delegated Identity API) used by the agent to mint
  # proxy SVIDs. hostPath is bind-mounted at mountPath; the socket is socketName.
  adminSocket:
    hostPath: /run/spire/agent/sockets/csi.spiffe.io/admin
    mountPath: /run/spire/admin-sockets
    socketName: admin.sock

# Proxy MeshConfig — the controller seeds and projects the singleton MeshConfig CR
# into a ConfigMap the agent mounts. The CR ONLY overrides the proxy data plane's
# observability; everything else is inherited from the system config above.
meshConfig:
  # Seed the singleton MeshConfig CR (name "default") on first install only — it
  # is created once and NEVER overwritten on upgrade (lookup-skip + Helm
  # resource-policy: keep), so operators own it via kubectl thereafter. Set false
  # to manage the CR entirely yourself.
  createDefault: true
  # The MeshConfig spec.proxy seeded into the default CR (protojson field names of
  # aether.config.v1.MeshConfig.proxy). An empty block means the proxy inherits
  # everything from the system config. Used only at first-install seeding.
  proxy: {}
    # accessLogsEnabled: false
    # accessLogSuccessSampleRate: 100
    # tracingEnabled: false
    # traceSampleRate: 0.01
    # emitStatsPod: false

# --------------------------------------------------------------------- agent
agent:
  # GAMMA east-west L7 routing (proposal 018, Phase 2): the node agent watches
  # HTTPRoutes parented to a Service and enriches the outbound routes (canary /
  # header / timeout). Requires the Gateway API CRDs. Default off — a no-op, and
  # adds the cluster-wide httproutes RBAC only when enabled.
  gamma: false
  # L4 route types (proposal 018, Phase 3b): watch TCPRoutes/TLSRoutes/UDPRoutes
  # parented to a Service and project weighted TCP floor chains + per-SNI TLS chains
  # onto the capture listener. Requires --transparent-capture. Default off.
  # NOTE: UDPRoute is control-plane only; the CNI UDP redirect is not yet wired.
  l4Routes: false
  # Transparent capture (proposal 018, Phase 3a): per-pod capture listeners + the
  # cap_http route table built from the generated mesh Services. Pairs with
  # registrar.generateMeshServices (the VIPs) and the CNI dst-18081 redirect.
  # Default ON (validated hitless under churn); adds the services-read RBAC.
  transparentCapture: true
  # SPIKE (proposal 022 M2a): redirect-ALL outbound TCP into the capture listener
  # with an ORIGINAL_DST passthrough for non-mesh destinations, so GAMMA routing
  # can apply to real Services on real ports. Requires --transparent-capture. This
  # only adds the (dormant) passthrough filter chain; a pod is redirect-all'd ONLY
  # when it carries the capture.aether.io/redirect-all="true" annotation. Default OFF.
  captureRedirectAll: false
  # Mesh DNS (proposal 018, mesh-global FQDN): the node agent runs an in-process
  # resolver answering <svc>.<meshDomain> from the generated mesh Services' ClusterIPs
  # (namespace-free, globally routable) and forwarding the rest to meshDnsUpstream;
  # the CNI DNATs each pod's :53 straight to it. Default ON. meshDnsUpstream defaults
  # to the agent's own resolv.conf (kube-dns via ClusterFirstWithHostNet) when empty,
  # so no per-cluster config is needed; set it only to override.
  meshDns: true
  meshDnsUpstream: []
  # Image as repository + digest (digest-pinned for immutability). Mirror to a
  # private registry by overriding `repository` alone; the digest is preserved.
  image:
    repository: "{@//agent/cmd/agent:image_push.repository}"
    digest: "{@//agent/cmd/agent:image_push.digest}"
    tag: ""
    pullPolicy: Always
  resources:
    requests:
      cpu: 200m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 64Mi
  # The agent reaches the registry through the registrar (gRPC), never AWS — so it
  # carries no AWS credentials. AWS is used only by the registrar's dynamodb
  # backend (see registrar.aws).

# CNI installer (init container). Its config is deterministic deploy-time data.
cniInstall:
  image:
    repository: "{@//cni/cmd/cni-install:image_push.repository}"
    digest: "{@//cni/cmd/cni-install:image_push.digest}"
    tag: ""
    pullPolicy: Always
  resources:
    requests:
      cpu: 100m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 32Mi

# Per-node Envoy proxy DaemonSet. Disable to deploy only the agent.
proxy:
  enabled: true
  # External image (built by the //proxy workspace), tag-pinned to the publishing
  # commit SHA. Mirror by overriding `repository`.
  image:
    repository: ghcr.io/bpalermo/aether/aether-proxy
    tag: d86328b772ee5f6bf86fcd725eff0e2ff3e645f3
    digest: ""
    pullPolicy: Always
  logLevel: info
  # Emit Envoy's own application logs as one JSON object per line (bootstrap
  # application_log_config). Set false for Envoy's default text format.
  jsonLogs: true
  # Envoy hot restart tunables (the mechanism itself is not optional). See
  # docs/proposals/001_proxy-hot-restart.md.
  hotRestart:
    baseId: 0
    drainTime: 10s
    parentShutdownTime: 15s
    handoffDeadline: 0
    adminUnresponsiveDeadline: 0
    shmHostPath: /run/aether/shm
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      memory: 512Mi
  # Envoy overload manager graceful-degradation ladder; engages before the OOM
  # kill. Keep maxHeapSizeBytes at ~75% of resources.limits.memory.
  overload:
    enabled: true
    maxHeapSizeBytes: 402653184 # 384Mi = 75% of 512Mi

# ----------------------------------------------------------------------- edge
# North-south ingress gateway (proposal 003): an unprivileged Deployment running
# Envoy + an `agent edge` sidecar that serves it xDS. The edge dials mesh pods
# DIRECTLY over mTLS (no node DaemonSet in the path) and routes external traffic
# by Gateway API HTTPRoutes (proposal 018): per-FQDN, ordered path-matched rules to
# mesh services, attached to a Gateway of the edge's GatewayClass. Envoy fetches its
# single SVID straight from SPIRE over the workload socket (no agent SPIRE bridge).
# Disabled by default.
edge:
  enabled: false
  # The edge is an ingress gateway, not a mesh workload, so it runs in its own
  # namespace, isolated from the control plane. namespaceCreate lets the chart
  # create it (with baseline PSA); set false if you manage the namespace yourself.
  namespace: aether-ingress
  namespaceCreate: true
  # Gateway replicas behind the Service; rolled with the standard RollingUpdate
  # + readiness gate (no hot-restart supervisor — nothing node-local to preserve).
  replicaCount: 2
  # The edge reuses the agent image (run as `agent edge`) and the proxy image
  # (plain Envoy entrypoint). Override agent.image / proxy.image to mirror.
  # Ports the edge's public-facing listeners bind (north-south). Privileged ports
  # (<1024, e.g. 80/443) are bound by granting the Envoy container
  # NET_BIND_SERVICE — the pod still runs unprivileged. With tls.enabled the edge
  # serves HTTPS on httpsPort and an HTTP->HTTPS redirect on httpPort; otherwise
  # plain HTTP on httpPort.
  httpPort: 80
  httpsPort: 443
  # Port the dedicated, always-bound readiness listener binds (the kubelet
  # readiness probe target, plain HTTP). It is independent of the public HTTP/HTTPS
  # listeners so the probe survives proposal 021 Phase 2, where those listeners move
  # to per-Gateway internal ports and nothing binds the HTTPS port. Internal only —
  # never exposed via a Service.
  readinessPort: 15021
  # Namespace the edge watches its Gateways/HTTPRoutes in. Empty = the edge's own
  # namespace.
  routeNamespace: ""
  # The edge routes exclusively via Gateway API (proposal 018): it serves the
  # HTTPRoutes attached to Gateways of this GatewayClass. Requires the Gateway API
  # CRDs installed (standard channel); the chart renders this GatewayClass bound to
  # the aether edge controller (gateway.aether.io/edge).
  gatewayClassName: aether
  # gateway controls the chart-managed Gateway resource for this edge deployment.
  # By default the chart creates one Gateway of the aether GatewayClass with HTTP
  # (and optionally HTTPS) listeners. Set create=false to manage your own Gateway
  # (you MUST add gateway.aether.io/http-redirect: "true" to that Gateway if you
  # want HTTP→HTTPS redirect). When tls.enabled=true the chart automatically adds
  # the http-redirect annotation to the generated Gateway.
  gateway:
    create: true
    # tlsSecretName / tlsSecretNamespace: the kubernetes.io/tls Secret holding the
    # downstream TLS cert. REQUIRED when tls.enabled=true and gateway.create=true.
    # The Secret must be in the edge namespace (or tlsSecretNamespace if set).
    tlsSecretName: ""
    tlsSecretNamespace: ""
    # address pins the Gateway's spec.addresses. Under proposal 021 Phase 2
    # (perGatewayAddressing) the edge controller requests this IP from MetalLB for
    # the Gateway's own LoadBalancer Service, so the edge keeps a stable address
    # (e.g. the IP api.palermo.dev resolves to). Empty = MetalLB auto-assigns from
    # the pool.
    address: ""
    # hostname constrains the chart-managed Gateway's listeners (e.g.
    # "*.palermo.dev"). Empty = listeners accept any host.
    hostname: ""
    # httpRoutes declares HTTPRoutes managed by this chart, each parented to the
    # chart-managed edge Gateway above. This is the supported, declarative
    # replacement for hand-applying HTTPRoute manifests (DEPRECATED). Each entry:
    #   - name: api
    #     hostnames: ["api.palermo.dev"]
    #     rules:
    #       - backendRefs:
    #           - name: my-backend
    #             port: 8080
    # `rules` is a standard Gateway API HTTPRoute rules list (matches, backendRefs,
    # filters), passed through verbatim.
    httpRoutes: []
  # Per-Gateway addressing (proposal 021 Phase 2): when enabled (the default),
  # the edge controller creates one LoadBalancer Service per class-aether Gateway,
  # MetalLB assigns each its own IP from the pool, and the edge proxy binds a
  # distinct internal port per (Gateway, listener). Set to false to fall back to
  # Phase 1 (single shared edge LB IP for all Gateways, no per-Gateway Services).
  perGatewayAddressing: true
  # Downstream (external-facing) TLS. Certs are referenced per Gateway listener
  # (spec.listeners[].tls.certificateRefs, a kubernetes.io/tls Secret in the
  # watched namespace), read by the edge agent and served to Envoy over SDS
  # (SNI-selected, hot rotation, no pod roll). Aether does not issue certs — bring
  # your own (cert-manager, kubectl, …). The edge->pod upstream hop stays mTLS.
  tls:
    enabled: false
  # Envoy admin endpoint, bound to pod-local loopback (127.0.0.1) only — never
  # exposed via a Service. Off by default (it is an unauthenticated control surface
  # even on loopback); enable for diagnostics (config_dump/stats) and reach it with
  # `kubectl port-forward <edge-pod> 9901:9901`.
  admin:
    enabled: false
    port: 9901
  service:
    type: LoadBalancer
    port: 80
    httpsPort: 443
    annotations: {}
    # extraPorts declares additional TCP ports on the edge Service so the LoadBalancer
    # exposes them. Each entry becomes a spec.ports item. Use this to expose the ports
    # bound by Gateway TCP/TLS listeners (TCPRoute/TLSRoute parented to the edge Gateway).
    # Example: [{name: postgres, port: 5432, protocol: TCP}]
    extraPorts: []
  resources:
    requests:
      cpu: 200m
      memory: 128Mi
    limits:
      memory: 256Mi
  # The edge pod is unprivileged (private cgroup namespace), so the cgroup_memory
  # overload monitor — fatal in the privileged node DaemonSet — works here.
  overload:
    enabled: true
    maxHeapSizeBytes: 201326592 # 192Mi = 75% of 256Mi
  # Hitless-rollout drain. The per-Gateway LoadBalancer Services use
  # externalTrafficPolicy: Cluster, so on a rollout kube-proxy keeps routing to a
  # terminating pod for the endpoint-propagation window. Without a drain, the edge
  # Envoy receives SIGTERM and stops accepting BEFORE that endpoint is withdrawn,
  # so connections kube-proxy still steers to it are reset (measured ~0.25%/roll).
  #
  # Mirrors the node proxy's two-phase drain (proxy.hotRestart.drainTime = 10s, the
  # empirically 0-fail value): a native kubelet `sleep` preStop holds SIGTERM off
  # both containers for preStopSeconds. The pod is already Terminating, so kube-proxy
  # withdraws its endpoint during the sleep WHILE Envoy keeps accepting and serving
  # in-flight requests. Only after the sleep does Envoy get SIGTERM and drain
  # gracefully. terminationGracePeriodSeconds must comfortably exceed the sleep plus
  # Envoy's own graceful-shutdown drain. The native `sleep` lifecycle action (GA
  # k8s 1.30+) is used so no in-container shell is required — the edge Envoy/agent
  # images are distroless (no /bin/sleep, curl, or wget).
  drain:
    # Seconds the preStop sleep holds off SIGTERM so kube-proxy propagates the
    # endpoint removal while Envoy still serves. Matches proxy.hotRestart.drainTime.
    # 0 disables the preStop hook entirely.
    preStopSeconds: 10
    # Pod terminationGracePeriodSeconds. Must exceed preStopSeconds plus Envoy's
    # graceful drain so SIGKILL never lands mid-drain. Default 30 = 10s sleep +
    # ~15s Envoy drain + buffer.
    terminationGracePeriodSeconds: 30
  # SPIRE identity for the edge (when spire.enabled): create a ClusterSPIFFEID so
  # SPIRE issues the edge pod its SVID. Mirrors controller.webhook.clusterSpiffeID.
  spire:
    clusterSpiffeID:
      create: true
      # spire-controller-manager class name (e.g. "spire-mgmt-spire"). REQUIRED
      # when create=true; empty = not rendered (manage the ClusterSPIFFEID yourself).
      className: ""

# ----------------------------------------------------------------- registrar
registrar:
  image:
    repository: "{@//registrar/cmd/registrar:image_push.repository}"
    digest: "{@//registrar/cmd/registrar:image_push.digest}"
    tag: ""
    pullPolicy: Always
  # 2 replicas ALWAYS (directive 2026-06-11): exercises the multi-replica
  # write-behind topology permanently.
  replicaCount: 2
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 64Mi
  service:
    port: 443
    targetPort: 8443
  # Registry backend (`--registry-backend`): kubernetes, dynamodb, etcd.
  registryBackend: kubernetes
  # Transparent-capture VIPs (proposal 018, Phase 3a): the leader registrar projects
  # the mesh catalog into selectorless k8s Services on the mesh port (ClusterIP +
  # cluster.local name + annotation; no EndpointSlices). Default ON — the VIPs +
  # mesh-DNS records that capture and meshDns depend on; adds Service CRUD RBAC.
  generateMeshServices: true
  # Multi-Cluster Services (MCS-API) phase 1 (`--enable-mcs`; proposals 018 + 006):
  # the leader registrar exports local ServiceExports to the registry and
  # materializes a ServiceImport (ClusterSetIP) + a local clusterset.local VIP
  # Service for every service exported anywhere in the clusterset. Requires the
  # etcd backend (the cross-cluster plane); no-ops/errors for kubernetes/dynamodb.
  # Default OFF — adds ServiceExport/ServiceImport RBAC only when enabled. The MCS
  # ServiceExport/ServiceImport CRDs must be installed separately (the upstream
  # sigs.k8s.io/mcs-api CRDs). DNS stays strictly local; the cross-cluster data
  # path (remote endpoint resolution) is a later phase.
  enableMCS: false
  # Region owning this registrar's etcd partition (etcd backend; proposal 006).
  # Keys are origin-first /aether/v1/regions/<region>/clusters/<clusterName>/…;
  # shared by every registrar on the same regional etcd.
  region: local
  # etcd client endpoints (used when registryBackend == etcd).
  etcd:
    endpoints: []
  # AWS config for the dynamodb registry backend (IRSA web-identity, no static
  # keys; issue #257). roleArn annotates the registrar ServiceAccount with
  # eks.amazonaws.com/role-arn so the pod-identity webhook injects AWS_ROLE_ARN +
  # a projected token. Empty = no AWS access (etcd/kubernetes backends).
  aws:
    region: us-east-1
    roleArn: ""

# ---------------------------------------------------------------- controller
controller:
  image:
    repository: "{@//controller/cmd/controller:image_push.repository}"
    digest: "{@//controller/cmd/controller:image_push.digest}"
    tag: ""
    pullPolicy: Always
  # Leader election is on; extra replicas are warm standbys.
  replicaCount: 1
  # Pod-ndots mutating webhook (proposal 018, mesh-global FQDN): inject dnsConfig
  # ndots (= the mesh-domain label count) into managed pods so a mesh FQDN
  # (<svc>.<meshDomain>) resolves absolute-first, before the cluster.local search
  # list — without it, musl/Alpine clients fail to resolve mesh names. Scoped to
  # aether.io/managed pods, failurePolicy=Ignore. Default ON; pairs with mesh DNS.
  injectPodNdots: true
  # Namespace auto-injection (Istio-style): a pod created in a namespace labeled
  # aether.io/managed=true is given the aether.io/managed=true POD label by the
  # pod-mutating webhook, so the CNI meshes it without a per-pod label. A pod that
  # sets aether.io/managed=false opts out. Only acts on explicitly-labeled
  # namespaces (no-op otherwise), failurePolicy=Ignore. Default ON.
  namespaceInjection: true
  webhook:
    # Webhook serving cert source — DECOUPLED from mesh SPIRE (spire.enabled).
    #   false (default): a Helm self-signed cert (genSignedCert, caBundle baked
    #     into the webhook config). Validates out of the box, no SPIRE setup.
    #   true: serve with the controller's SPIRE X.509 SVID and inject the trust
    #     bundle into the caBundle at runtime. Requires the ClusterSPIFFEID below
    #     (or an equivalent) granting the controller the webhook Service DNS name
    #     in its dnsNames, else the apiserver's TLS hostname check fails.
    spire: false
    # When spire=true, have the chart create the controller's ClusterSPIFFEID with
    # the webhook Service DNS SANs, so SPIRE mode works without a manual entry.
    clusterSpiffeID:
      create: true
      # spire-controller-manager class name for your SPIRE install (e.g.
      # "spire-mgmt-spire"). REQUIRED when create=true; if empty the resource is
      # not rendered (manage the ClusterSPIFFEID yourself).
      className: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 64Mi
