apiVersion: v2
name: aether
description: |
  Aether service mesh — umbrella chart. Treats the whole system (CRDs, controller,
  registrar, agent) as one unit and sets system-wide config (OTEL, SPIRE, mesh
  domain) ONCE via the top-level `global:` block, inherited by every subchart. The
  proxy data plane can override its own observability via the MeshConfig CR (owned
  by the controller subchart). See docs/proposals/015_mesh-config.md.
type: application
version: "0.1.0-{GIT_COMMIT}"
appVersion: "{STABLE_GIT_VERSION}"
keywords:
  - aether
  - service-mesh
sources:
  - https://github.com/bpalermo/aether
# Subchart dependencies (crds, controller, registrar, agent) are injected by the
# Bazel helm packager from the `deps` attribute in BUILD.bazel; do not list them
# here or the versions must be kept in lockstep with each subchart.
