apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: edgeroutes.config.aether.io
  annotations:
    # Keep the CRD (and the CRs it owns) if this chart is uninstalled — CRD
    # removal cascade-deletes every EdgeRoute. Delete deliberately if needed.
    helm.sh/resource-policy: keep
spec:
  group: config.aether.io
  scope: Namespaced
  names:
    kind: EdgeRoute
    listKind: EdgeRouteList
    plural: edgeroutes
    singular: edgeroute
    shortNames:
      - er
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          description: |
            EdgeRoute maps external (north-south) hostnames to a mesh service for
            the edge proxy (aether.config.v1.EdgeRouteSpec). The spec is a
            permissive structural object: authoritative validation is
            protovalidate (CEL/hostname constraints do not translate to OpenAPI),
            so new spec fields need no CRD change.
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      additionalPrinterColumns:
        - name: Service
          type: string
          jsonPath: .spec.service
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
