apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: meshconfigs.config.aether.io
  annotations:
    # Keep the CRD (and the CRs it owns) if this chart is uninstalled — CRD
    # removal cascade-deletes every MeshConfig. Delete deliberately if needed.
    helm.sh/resource-policy: keep
spec:
  group: config.aether.io
  scope: Cluster
  names:
    kind: MeshConfig
    listKind: MeshConfigList
    plural: meshconfigs
    singular: meshconfig
    shortNames:
      - mc
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          description: |
            MeshConfig is the mesh-wide policy (aether.config.v1.MeshConfig) the
            aether-controller validates with protovalidate and projects into the
            ConfigMap the agent and registrar mount. The spec is intentionally a
            permissive structural object: the authoritative validation is the
            controller's webhook (protovalidate), not this OpenAPI schema, because
            protovalidate constraints (CEL, ranges, hostname) do not translate to
            OpenAPI. New config fields therefore need no CRD change.
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      additionalPrinterColumns:
        - name: Projected
          type: string
          jsonPath: .status.conditions[?(@.type=="Projected")].status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
