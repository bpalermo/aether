apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: virtualhosts.config.aether.io
  annotations:
    # Keep the CRD (and the CRs it owns) if this chart is uninstalled — CRD
    # removal cascade-deletes every VirtualHost. Delete deliberately if needed.
    helm.sh/resource-policy: keep
spec:
  group: config.aether.io
  scope: Namespaced
  names:
    kind: VirtualHost
    listKind: VirtualHostList
    plural: virtualhosts
    singular: virtualhost
    shortNames:
      - vh
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          description: |
            VirtualHost maps an external (north-south) FQDN (or wildcard) to an
            ordered list of path-matched routes to mesh services for the edge
            proxy (aether.config.v1.VirtualHostSpec). It supersedes EdgeRoute. The
            spec is a permissive structural object: authoritative validation is
            protovalidate (CEL/hostname constraints do not translate to OpenAPI),
            so new spec fields need no CRD change.
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      additionalPrinterColumns:
        - name: Hosts
          type: string
          jsonPath: .spec.hosts
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
